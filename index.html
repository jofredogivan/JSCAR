<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red-japan: #e63946; --bg-dark: #121212; --card-bg: #1a1a1a; }
        
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .home-card {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-bottom: 5px solid var(--red-japan);
        }

        .logo-box i {
            font-size: 4rem;
            color: var(--red-japan);
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 5px; font-weight: 900; }
        .subtitle { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        .welcome-text {
            font-size: 1rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--red-japan);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.3);
        }
        .btn-main:active { transform: scale(0.95); }

        .btn-logout {
            margin-top: 25px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            margin-right: auto;
        }
        
        #userBadge {
            font-size: 0.7rem;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="home-card">
        <div class="logo-box">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>JAPAN</h1>
        <div class="subtitle">Security Car Management</div>

        <div class="welcome-text">
            Olá, <strong>Operador</strong>.<br>
            O sistema de gestão de frota está pronto para operação.
        </div>

        <a href="dashboard.html" class="btn-main">
            <i class="fas fa-chart-pie"></i>
            ACESSAR DASHBOARD
        </a>

        <button id="btnLogout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i>
            Encerrar Sessão
        </button>

        <div id="userBadge">Verificando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userBadge').innerText = user.email;
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('btnLogout').onclick = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        };
    </script>
</body>
</html>
