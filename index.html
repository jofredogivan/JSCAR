<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #e63946; --dark: #121212; --card: #1e1e1e; --border: #333; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header-home { text-align: center; padding: 50px 20px; }
        .header-home h1 { color: var(--red); margin: 0; font-size: 2.5rem; letter-spacing: 3px; }
        .header-home p { color: #888; font-size: 0.9rem; margin-top: 5px; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; width: 100%; max-width: 500px; box-sizing: border-box; }
        
        .menu-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 35px 10px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); background: #252525; }
        .menu-item i { font-size: 2.5rem; color: var(--red); margin-bottom: 15px; }
        .menu-item span { font-weight: bold; font-size: 1rem; }
        
        /* Botão de destaque para o Dashboard */
        .btn-dash-link { margin-top: 20px; color: var(--red); text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid var(--red); padding-bottom: 2px; }
    </style>
</head>
<body>

    <header class="header-home">
        <h1>JAPAN</h1>
        <p>OPERACIONAL MOBILE</p>
    </header>

    <div class="menu-grid">
        <a href="entrada_saida.html" class="menu-item">
            <i class="fas fa-exchange-alt"></i>
            <span>Movimentação</span>
        </a>
        <a href="vistoria.html" class="menu-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Vistoria</span>
        </a>
        <a href="vehicles.html" class="menu-item">
            <i class="fas fa-car"></i>
            <span>Frota</span>
        </a>
        <a href="dashboard.html" class="menu-item">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>
    </div>

    <a href="dashboard.html" class="btn-dash-link">Ver Alertas de Manutenção</a>

</body>
</html>
