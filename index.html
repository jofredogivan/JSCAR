<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Dashboard</title>
    
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* CSS para garantir o indicador vivo no topo */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid #333;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #27ae60;
            border-radius: 50%;
            box-shadow: 0 0 10px #27ae60;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }
    </style>
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Entrada/Saída</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1>Painel de Controle</h1>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span style="color: #fff; font-size: 11px; font-weight: bold; letter-spacing: 1px;">SISTEMA ATIVO</span>
            </div>
        </header>

        <section class="content-body">
            <div class="dashboard-grid">
                <div class="card dash-card">
                    <i class="fas fa-car" style="color: #e63946;"></i>
                    <div class="info"><h3>Frota</h3><p id="totalVeiculos">0</p></div>
                </div>
                <div class="card dash-card">
                    <i class="fas fa-route" style="color: #f1c40f;"></i>
                    <div class="info"><h3>Em Rota</h3><p id="totalRota">0</p></div>
                </div>
                <div class="card dash-card">
                    <i class="fas fa-clipboard-list" style="color: #27ae60;"></i>
                    <div class="info"><h3>Vistorias</h3><p id="totalVistorias">0</p></div>
                </div>
            </div>

            <div class="row mt-20">
                <div class="card" style="flex: 2; min-height: 300px;">
                    <div class="card-header">Movimentação Mensal</div>
                    <canvas id="graficoLinha"></canvas>
                </div>
                <div class="card" style="flex: 1; min-height: 300px;">
                    <div class="card-header">Disponibilidade</div>
                    <canvas id="graficoPizza"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
