<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Login</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card-login { 
            background: #1a1a1a; 
            padding: 40px 30px; 
            border-radius: 16px; 
            width: 90%; 
            max-width: 350px; 
            border-bottom: 5px solid #e63946; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-icon { font-size: 3rem; color: #e63946; margin-bottom: 15px; }
        .modern-input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: #252525; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
        }
        .modern-input:focus { border-color: #e63946; background: #2a2a2a; }
        .btn-acessar { 
            background: #e63946; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-acessar:active { transform: scale(0.98); opacity: 0.9; }
        .btn-criar { 
            background: transparent; 
            color: #666; 
            border: none; 
            width: 100%; 
            padding: 10px; 
            margin-top: 20px; 
            cursor: pointer; 
            font-size: 0.75rem; 
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card-login">
        <i class="fas fa-shield-alt logo-icon"></i>
        <div style="color: white; font-weight: 900; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 5px;">JAPAN</div>
        <div style="color: #e63946; font-size: 0.75rem; margin-bottom: 30px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px;">Security Car Management</div>

        <input type="email" id="email" class="modern-input" placeholder="E-mail de acesso">
        <input type="password" id="password" class="modern-input" placeholder="Senha">
        
        <button class="btn-acessar" onclick="login()">ENTRAR NO PAINEL</button>
        <button class="btn-criar" onclick="cadastrar()">Ainda não tem conta? Criar acesso</button>

        <div id="msg" style="margin-top: 20px; font-size: 0.85rem; color: #ffb703; min-height: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // REGISTRO DO SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registrado!', reg);
                }).catch(err => {
                    console.log('Erro no SW:', err);
                });
            });
        }

        // --- LÓGICA DE INATIVIDADE NA TELA DE LOGIN ---
        let inactivityTimer;
        const INACTIVITY_LIMIT = 15 * 60 * 1000; // 15 minutos

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                // Se estiver inativo na tela de login, limpa os campos por segurança
                document.getElementById('email').value = "";
                document.getElementById('password').value = "";
                document.getElementById('msg').innerText = "Sessão expirada por inatividade.";
            }, INACTIVITY_LIMIT);
        }

        window.onload = resetInactivityTimer;
        document.onmousemove = resetInactivityTimer;
        document.onkeydown = resetInactivityTimer;

        // --- FUNÇÃO DE LOGIN ATUALIZADA ---
        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if(!email || !password) {
                msg.innerText = "Preencha todos os campos.";
                return;
            }

            msg.innerText = "Autenticando...";

            try {
                // CONFIGURAÇÃO: Login expira ao fechar o navegador/aba
                await setPersistence(auth, browserSessionPersistence);
                
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html"; 
            } catch (error) {
                msg.innerText = "Erro: E-mail ou senha incorretos.";
            }
        };

        window.cadastrar = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (password.length < 6) {
                msg.innerText = "A senha deve ter pelo menos 6 dígitos.";
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                msg.style.color = "#2ecc71";
                msg.innerText = "Conta criada! Agora clique em ENTRAR.";
            } catch (error) {
                msg.innerText = "Erro ao criar conta. Verifique o e-mail.";
            }
        };
    </script>
</body>
</html>
