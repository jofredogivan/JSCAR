<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilo rápido para manter o padrão que você gosta */
        body { background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card-login { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 100%; max-width: 320px; border-bottom: 4px solid #e63946; text-align: center; }
        .modern-input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-acessar { background: #e63946; color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-criar { background: transparent; color: #888; border: 1px solid #333; width: 100%; padding: 10px; border-radius: 6px; margin-top: 10px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card-login">
        <div style="color: #e63946; font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 5px;">JAPAN SECURITY</div>
        <div style="color: #888; font-size: 0.7rem; margin-bottom: 25px; text-transform: uppercase;">Controle de Frota</div>

        <input type="email" id="email" class="modern-input" placeholder="Seu e-mail">
        <input type="password" id="password" class="modern-input" placeholder="Sua senha">
        
        <button class="btn-acessar" onclick="login()">ENTRAR NO SISTEMA</button>
        <button class="btn-criar" onclick="cadastrar()">CRIAR MINHA CONTA</button>

        <div id="msg" style="margin-top: 15px; font-size: 0.8rem; color: #ffb703;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Seus dados integrados aqui:
        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Função de Login
        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html"; // Vai para a tela inicial
            } catch (error) {
                msg.innerText = "Erro: Usuário ou senha incorretos.";
            }
        };

        // Função de Cadastro
        window.cadastrar = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (password.length < 6) {
                msg.innerText = "A senha deve ter pelo menos 6 dígitos.";
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("Conta criada com sucesso! Você já pode entrar.");
            } catch (error) {
                msg.innerText = "Erro ao criar conta. Tente outro e-mail.";
            }
        };
    </script>
</body>
</html>
