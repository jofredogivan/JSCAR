<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Manutenção</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area"><i class="fas fa-shield-alt logo-icon"></i><div><h2>JAPAN</h2><span>SECURITY</span></div></div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Entrada/Saída</a></li>
                <li><a href="maintenance.html" class="active"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar"><h1>Controle de Manutenções</h1></header>

        <section class="content-body">
            <div class="card form-card">
                <div class="card-header"><i class="fas fa-wrench"></i> Registrar Novo Serviço</div>
                <div class="row">
                    <div class="input-group">
                        <label>Veículo</label>
                        <input list="listaVeiculos" id="veiculo" class="modern-input" placeholder="Selecione..." onchange="puxarKmAutomatico()">
                        <datalist id="listaVeiculos"></datalist>
                    </div>
                    <div class="input-group"><label>KM Atual</label><input id="km" type="number" class="modern-input"></div>
                    <div class="input-group"><label>Tipo de Serviço</label><input id="servico" class="modern-input" placeholder="Ex: Troca de Óleo"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Data do Serviço</label><input type="date" id="dataServico" class="modern-input"></div>
                    <div class="input-group"><label>Próxima Troca (KM)</label><input id="proximaTroca" type="number" class="modern-input" placeholder="Defina o KM da próxima"></div>
                </div>
                <button class="btn-primary" onclick="salvar()"><i class="fas fa-save"></i> Salvar Manutenção</button>
            </div>

            <div class="card filter-card mt-20">
                <div class="card-header"><i class="fas fa-filter"></i> Filtro e Relatório PDF</div>
                <div class="row">
                    <div class="input-group"><label>Data Início:</label><input type="date" id="dataInicio" class="modern-input"></div>
                    <div class="input-group"><label>Data Fim:</label><input type="date" id="dataFim" class="modern-input"></div>
                </div>
                <div style="padding: 0 20px 20px; display: flex; gap: 10px;">
                    <button class="btn-secondary" onclick="renderizarTabela()"><i class="fas fa-search"></i> Filtrar Lista</button>
                    <button class="btn-accent" onclick="gerarPDF()"><i class="fas fa-file-pdf"></i> Gerar PDF Organizado</button>
                </div>
            </div>

            <div class="card table-card mt-20">
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Veículo</th>
                                <th>Data</th>
                                <th>Serviço</th>
                                <th>KM Atual</th>
                                <th>Próxima Troca</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabela"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <script src="js/maintenance.js"></script>
</body>
</html>
