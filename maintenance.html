<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #e63946; --bg: #121212; --card: #1a1a1a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .modern-input { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--primary); font-size: 0.8rem; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .btn-acao { padding: 8px; margin-right: 5px; border-radius: 4px; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="color:var(--primary); margin-top:0;">Nova Manutenção</h3>
        <input list="listaVeiculos" id="m_veiculo" class="modern-input" placeholder="Viatura (Placa)">
        <datalist id="listaVeiculos"></datalist>
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="number" id="m_valor" class="modern-input" placeholder="Valor R$">
            <input type="datetime-local" id="m_data" class="modern-input">
        </div>
        
        <input type="text" id="m_servico" class="modern-input" placeholder="Descrição do Serviço">
        
        <button id="btnSalvar" style="width:100%; background:var(--primary); color:white; padding: 15px; margin-top:15px;">
            <i class="fas fa-save"></i> SALVAR REGISTRO
        </button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">Histórico</h3>
            <button onclick="location.reload()" style="background:#333; color:white; padding:5px 10px;">Atualizar Lista</button>
        </div>
        <div id="status">Carregando dados...</div>
        <table>
            <thead>
                <tr>
                    <th>Veículo/Serviço</th>
                    <th>Valor/Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let editId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                carregarHistorico(); 
            } else { 
                window.location.href = "login.html"; 
            }
        });

        async function carregarHistorico() {
            const corpo = document.getElementById('tabelaCorpo');
            const status = document.getElementById('status');
            
            try {
                // Busca simples sem ORDER BY para evitar erro de índice
                const q = query(collection(db, "manutencoes"), where("usuario", "==", auth.currentUser.email));
                const snap = await getDocs(q);
                
                corpo.innerHTML = "";
                
                if (snap.empty) {
                    status.innerText = "Nenhum registro encontrado.";
                    return;
                }

                status.innerText = "";
                
                // Transformar em array e ordenar manualmente por data (mais recente primeiro)
                let lista = [];
                snap.forEach(d => lista.push({ id: d.id, ...d.data() }));
                lista.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                lista.forEach(item => {
                    corpo.innerHTML += `
                        <tr>
                            <td>
                                <small style="color:#888">${item.dataExibicao || ''}</small><br>
                                <b>${item.veiculo}</b><br>
                                <span style="font-size:0.8rem; color:var(--primary)">${item.servico}</span>
                            </td>
                            <td>
                                <b>R$ ${parseFloat(item.valor).toFixed(2)}</b><br><br>
                                <button onclick="window.editar('${item.id}')" style="background:#3498db; color:white; padding:5px;"><i class="fas fa-edit"></i></button>
                                <button onclick="window.excluir('${item.id}')" style="background:#e63946; color:white; padding:5px;"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                status.innerText = "Erro ao carregar: " + e.message;
            }
        }

        document.getElementById('btnSalvar').onclick = async () => {
            const btn = document.getElementById('btnSalvar');
            const veiculo = document.getElementById('m_veiculo').value.toUpperCase();
            if(!veiculo) return alert("Digite a placa");

            btn.disabled = true;
            btn.innerText = "SALVANDO...";

            const dataInput = document.getElementById('m_data').value;
            const dataObj = dataInput ? new Date(dataInput) : new Date();

            const dados = {
                veiculo: veiculo,
                valor: parseFloat(document.getElementById('m_valor').value) || 0,
                servico: document.getElementById('m_servico').value.toUpperCase(),
                dataExibicao: dataObj.toLocaleString('pt-BR'),
                timestamp: dataObj.getTime(),
                usuario: auth.currentUser.email
            };

            try {
                if(editId) {
                    await updateDoc(doc(db, "manutencoes", editId), dados);
                    alert("Atualizado com sucesso!");
                    editId = null;
                } else {
                    await addDoc(collection(db, "manutencoes"), dados);
                    alert("Salvo com sucesso!");
                }
                location.reload();
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
                btn.disabled = false;
            }
        };

        window.editar = async (id) => {
            const docRef = doc(db, "manutencoes", id);
            const snap = await getDoc(docRef);
            if(snap.exists()){
                const d = snap.data();
                editId = id;
                document.getElementById('m_veiculo').value = d.veiculo;
                document.getElementById('m_valor').value = d.valor;
                document.getElementById('m_servico').value = d.servico;
                document.getElementById('btnSalvar').style.background = "#3498db";
                document.getElementById('btnSalvar').innerText = "ATUALIZAR REGISTRO";
                window.scrollTo(0,0);
            }
        };

        window.excluir = async (id) => {
            if(confirm("Tem certeza que deseja excluir?")){
                await deleteDoc(doc(db, "manutencoes", id));
                carregarHistorico();
            }
        };

    </script>
</body>
</html>
