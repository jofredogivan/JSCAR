<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Manutenção</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #e63946; --bg: #121212; --card: #1a1a1a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        .modern-input { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-primary { width: 100%; cursor: pointer; transition: 0.3s; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 2px solid var(--primary); padding: 10px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        .action-icons i { cursor: pointer; margin-right: 15px; font-size: 1.1rem; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #e63946; position: sticky; top: 0; z-index: 1000;">
        <a href="dashboard.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left" style="color: #e63946;"></i> VOLTAR
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">GESTÃO DE MANUTENÇÃO</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div class="card" style="text-align: center; border-bottom: 3px solid #e63946;">
                <small style="color: #888; font-size: 0.6rem; text-transform: uppercase;">Investimento Filtrado</small>
                <div id="totalGasto" style="font-size: 1.1rem; font-weight: bold;">R$ 0,00</div>
            </div>
            <div class="card" style="text-align: center; border-bottom: 3px solid #3498db;">
                <small style="color: #888; font-size: 0.6rem; text-transform: uppercase;">Qtd. Serviços</small>
                <div id="totalRegistros" style="font-size: 1.1rem; font-weight: bold;">0</div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 15px;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label style="color: #e63946; font-size: 0.7rem; font-weight: bold;">FILTRAR E GERAR RELATÓRIO</label>
                <input list="listaVeiculos" id="f_placa" class="modern-input" placeholder="Todas as Placas">
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="f_data_ini" class="modern-input" style="flex: 1;">
                    <input type="date" id="f_data_fim" class="modern-input" style="flex: 1;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-primary" id="btnFiltrar" style="background: #333; color: white; border: none; padding: 12px; border-radius: 5px;">
                        <i class="fas fa-search"></i> FILTRAR
                    </button>
                    <button class="btn-primary" id="btnExportarPDF" style="background: #e63946; color: white; border: none; padding: 12px; border-radius: 5px;">
                        <i class="fas fa-file-pdf"></i> GERAR PDF
                    </button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div>
                    <label style="font-size: 0.7rem; color: #888;">VIATURA</label>
                    <input list="listaVeiculos" id="m_veiculo" class="modern-input" placeholder="Selecione a placa...">
                    <datalist id="listaVeiculos"></datalist>
                </div>

                <div style="background: #252525; padding: 10px; border-radius: 8px;">
                    <label style="font-size: 0.65rem; color: #e63946; font-weight: bold;">DATA/HORA DO SERVIÇO</label>
                    <input type="datetime-local" id="m_data_retroativa" class="modern-input" style="border: none; background: transparent;">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; color: #888;">TIPO</label>
                        <select id="m_tipo" class="modern-input">
                            <option value="PREVENTIVA">PREVENTIVA</option>
                            <option value="CORRETIVA">CORRETIVA</option>
                            <option value="PNEUS">PNEUS</option>
                            <option value="OUTROS">OUTROS</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; color: #888;">VALOR (R$)</label>
                        <input type="number" id="m_valor" class="modern-input" placeholder="0.00">
                    </div>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.7rem; color: #888;">DESCRIÇÃO DO SERVIÇO</label>
                    <input type="text" id="m_servico" class="modern-input" placeholder="O que foi feito?">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; color: #888;">KM ATUAL</label>
                        <input type="number" id="m_km" class="modern-input">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; color: #888;">PRÓXIMA (KM)</label>
                        <input type="number" id="m_proxima" class="modern-input">
                    </div>
                </div>

                <button class="btn-primary" id="btnSalvar" style="background: #e63946; color: white; padding: 18px; font-weight: bold; border: none; border-radius: 8px; text-transform: uppercase;">
                    <i class="fas fa-save"></i> SALVAR REGISTRO
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>VTR / Serviço</th>
                        <th>Valor / Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaManutencao"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, doc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let dadosFiltrados = [];
        let editId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarVeiculos();
                buscarManutencoes();
            } else {
                window.location.href = "login.html";
            }
        });

        // --- BUSCAR DADOS ---
        async function buscarManutencoes() {
            const placaFiltro = document.getElementById('f_placa').value.toUpperCase();
            const dIni = document.getElementById('f_data_ini').value;
            const dFim = document.getElementById('f_data_fim').value;

            try {
                // Tenta buscar com ordenação. Se der erro de índice, busca sem ordenação.
                let q;
                try {
                    q = query(collection(db, "manutencoes"), where("usuario", "==", auth.currentUser.email), orderBy("timestamp", "desc"));
                } catch (e) {
                    q = query(collection(db, "manutencoes"), where("usuario", "==", auth.currentUser.email));
                }

                const snap = await getDocs(q);
                const corpo = document.getElementById('tabelaManutencao');
                corpo.innerHTML = "";
                dadosFiltrados = [];
                let totalSoma = 0;

                snap.forEach(docSnap => {
                    const item = docSnap.data();
                    const id = docSnap.id;
                    const dataItem = item.dataISO ? item.dataISO.split('T')[0] : "";
                    
                    const batePlaca = placaFiltro === "" || item.veiculo.includes(placaFiltro);
                    const bateData = (!dIni || dataItem >= dIni) && (!dFim || dataItem <= dFim);

                    if (batePlaca && bateData) {
                        dadosFiltrados.push({...item, id});
                        totalSoma += (parseFloat(item.valor) || 0);
                        
                        corpo.innerHTML += `
                            <tr>
                                <td style="font-size:0.7rem; color: #888;">${item.dataExibicao}</td>
                                <td><b>${item.veiculo}</b><br><small style="color: #e63946">${item.servico}</small></td>
                                <td>
                                    <b>R$ ${(parseFloat(item.valor) || 0).toFixed(2)}</b>
                                    <div class="action-icons" style="margin-top:8px;">
                                        <i class="fas fa-edit" style="color: #3498db" onclick="window.preencherParaEditar('${id}')"></i>
                                        <i class="fas fa-trash" style="color: #e63946" onclick="window.excluirRegistro('${id}')"></i>
                                    </div>
                                </td>
                            </tr>`;
                    }
                });

                document.getElementById('totalGasto').innerText = `R$ ${totalSoma.toFixed(2)}`;
                document.getElementById('totalRegistros').innerText = dadosFiltrados.length;
            } catch (e) {
                console.error("Erro ao carregar:", e);
            }
        }

        // --- SALVAR / ATUALIZAR ---
        document.getElementById('btnSalvar').onclick = async () => {
            const btn = document.getElementById('btnSalvar');
            const vtr = document.getElementById('m_veiculo').value.toUpperCase();
            if(!vtr) return alert("Informe a Viatura");

            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            const dataRetro = document.getElementById('m_data_retroativa').value;
            const dObj = dataRetro ? new Date(dataRetro) : new Date();

            const dados = {
                veiculo: vtr,
                tipo: document.getElementById('m_tipo').value,
                valor: parseFloat(document.getElementById('m_valor').value) || 0,
                servico: (document.getElementById('m_servico').value || "GERAL").toUpperCase(),
                km: document.getElementById('m_km').value || "N/A",
                proxima_km: document.getElementById('m_proxima').value || "N/A",
                dataExibicao: dObj.toLocaleString('pt-BR'),
                dataISO: dObj.toISOString(),
                timestamp: dObj.getTime(),
                usuario: auth.currentUser.email
            };

            try {
                if(editId) {
                    await updateDoc(doc(db, "manutencoes", editId), dados);
                    alert("Atualizado!");
                } else {
                    await addDoc(collection(db, "manutencoes"), dados);
                    alert("Salvo!");
                }
                location.reload();
            } catch (e) {
                alert("Erro: " + e);
                btn.disabled = false;
            }
        };

        // --- FUNÇÕES GLOBAIS (EDITAR/EXCLUIR) ---
        window.preencherParaEditar = async (id) => {
            const snap = await getDoc(doc(db, "manutencoes", id));
            if(snap.exists()) {
                const d = snap.data();
                editId = id;
                document.getElementById('m_veiculo').value = d.veiculo;
                document.getElementById('m_tipo').value = d.tipo;
                document.getElementById('m_valor').value = d.valor;
                document.getElementById('m_servico').value = d.servico;
                document.getElementById('m_km').value = d.km === "N/A" ? "" : d.km;
                document.getElementById('m_proxima').value = d.proxima_km === "N/A" ? "" : d.proxima_km;
                if(d.dataISO) document.getElementById('m_data_retroativa').value = d.dataISO.substring(0, 16);

                const b = document.getElementById('btnSalvar');
                b.style.background = "#3498db";
                b.innerHTML = `<i class="fas fa-sync"></i> ATUALIZAR REGISTRO`;
                window.scrollTo({ top: 100, behavior: 'smooth' });
            }
        };

        window.excluirRegistro = async (id) => {
            if(confirm("Excluir definitivamente?")) {
                await deleteDoc(doc(db, "manutencoes", id));
                buscarManutencoes();
            }
        };

        // --- FILTROS E EXPORTAÇÃO ---
        document.getElementById('btnFiltrar').onclick = buscarManutencoes;
        
        document.getElementById('btnExportarPDF').onclick = () => {
            const { jsPDF } = window.jspdf;
            const docPDF = new jsPDF();
            docPDF.text("Relatório de Manutenção - Japan Security", 14, 15);
            
            const linhas = dadosFiltrados.map(i => [i.dataExibicao, i.veiculo, i.servico, `R$ ${i.valor}`]);
            docPDF.autoTable({
                head: [['Data', 'VTR', 'Serviço', 'Valor']],
                body: linhas,
                startY: 25,
                theme: 'grid'
            });
            docPDF.save("Relatorio_Manutencao.pdf");
        };

        async function carregarVeiculos() {
            const snap = await getDocs(collection(db, "veiculos"));
            const list = document.getElementById('listaVeiculos');
            snap.forEach(d => { list.innerHTML += `<option value="${d.data().placa}">`; });
        }
    </script>
</body>
</html>
