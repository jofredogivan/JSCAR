<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Manutenção</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="main-content">
        <header class="top-bar">
            <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Início</a>
            <h1>Manutenção</h1>
        </header>

        <div class="card">
            <div class="row">
                <div class="input-group"><label>Veículo</label><input list="listaVeiculos" id="veiculo" class="modern-input" onchange="puxarKmAutomatico()"><datalist id="listaVeiculos"></datalist></div>
                <div class="input-group"><label>KM do Serviço</label><input id="km" type="number" class="modern-input"></div>
                <div class="input-group"><label>Tipo de Serviço</label><input id="servico" class="modern-input" placeholder="Ex: Troca de Óleo"></div>
            </div>
            <button class="btn-primary" onclick="salvar()"><i class="fas fa-check-circle"></i> Salvar Manutenção</button>
        </div>
    </main>
    <script src="js/db.js"></script>
    <script src="js/maintenance.js"></script>
</body>
</html>
