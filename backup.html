<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Backup</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-sidebar">
    <main class="main-content">
        <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Menu</a>
        <header class="top-bar"><h1>Cópia de Segurança</h1></header>
        <div class="card">
            <div class="card-header"><i class="fas fa-download"></i> Exportar Dados</div>
            <p style="color: #888; margin-bottom: 15px;">Baixe o arquivo com todos os registros do sistema.</p>
            <button class="btn-accent" onclick="exportarBackup()">Baixar Backup</button>
        </div>
        <div class="card">
            <div class="card-header"><i class="fas fa-upload"></i> Importar Dados</div>
            <p style="color: #888; margin-bottom: 15px;">Restaurar registros de um arquivo anterior.</p>
            <input type="file" id="fileBackup" class="modern-input">
            <button class="btn-primary" onclick="importarBackup()" style="margin-top: 10px;">Restaurar Agora</button>
        </div>
    </main>
    <script src="js/backup.js"></script>
</body>
</html>
