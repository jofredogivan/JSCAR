<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronização de Histórico</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #121212; color: white; font-family: sans-serif; padding: 20px;">

    <div class="card" style="max-width: 500px; margin: auto; text-align: center; border: 1px solid #333; padding: 20px; border-radius: 10px;">
        <h2 style="color: #27ae60;">Histórico e Vistorias</h2>
        <p style="font-size: 0.8rem; color: #888;">Este script vai converter "viatura" para "veiculo" para que apareça nas listas.</p>
        
        <input type="file" id="fileBackup" accept=".json" style="margin: 20px 0; width: 100%;">
        
        <button id="btnImport" style="background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;">
            SINCRONIZAR MOVIMENTAÇÕES
        </button>

        <div id="status" style="margin-top: 20px; color: #ffb703; font-weight: bold;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('btnImport').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileBackup');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files[0]) return alert("Selecione o arquivo!");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const dados = JSON.parse(e.target.result);
                const email = auth.currentUser.email;
                const logs = dados.logs || [];
                
                statusDiv.innerText = "Iniciando envio de " + logs.length + " registros...";
                let enviados = 0;

                for (let l of logs) {
                    try {
                        const dataObj = new Date(l.timestamp || Date.now());
                        
                        // O SEGREDO ESTÁ AQUI: Convertendo 'viatura' para 'veiculo'
                        await addDoc(collection(db, "movimentacoes"), {
                            veiculo: l.viatura.toUpperCase().trim(), 
                            km: Number(l.km) || 0,
                            motorista: l.motorista.toUpperCase(),
                            tipo: l.tipo,
                            dataISO: dataObj.toISOString().split('T')[0], // Para o filtro de data
                            dataExibicao: l.data || dataObj.toLocaleString('pt-BR'),
                            timestamp: l.timestamp || dataObj.getTime(),
                            usuario: email
                        });

                        enviados++;
                        statusDiv.innerText = `Enviado: ${enviados} de ${logs.length}`;
                    } catch (err) {
                        console.error("Erro no item:", err);
                    }
                }

                alert("Sucesso! " + enviados + " movimentações sincronizadas.");
                window.location.href = "index.html";
            };
            reader.readAsText(fileInput.files[0]);
        });
    </script>
</body>
</html>
