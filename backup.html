<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Backup</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .backup-icon {
            font-size: 3rem;
            color: #e63946;
            margin: 20px 0;
            display: block;
            text-align: center;
        }
        .info-text {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .section-title {
            color: white;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .divider {
            height: 1px;
            background: #333;
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">BACKUP</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <i class="fas fa-database backup-icon"></i>
        <p class="info-text">
            O backup salva todos os dados de veículos, vistorias e movimentações em um único arquivo.
        </p>

        <div class="card">
            <div class="section-title">
                <i class="fas fa-file-export"></i> Exportar Dados
            </div>
            <p style="color: #666; font-size: 0.75rem; margin-bottom: 15px;">
                Crie um arquivo de segurança para guardar ou transferir para outro dispositivo.
            </p>
            <button class="btn-primary" onclick="exportarBackup()">
                <i class="fas fa-download"></i> BAIXAR BACKUP (.JSON)
            </button>
        </div>

        <div class="divider"></div>

        <div class="card">
            <div class="section-title" style="color: #27ae60;">
                <i class="fas fa-file-import"></i> Restaurar Backup
            </div>
            <p style="color: #666; font-size: 0.75rem; margin-bottom: 15px;">
                Selecione um arquivo de backup para restaurar os dados neste dispositivo.
            </p>
            
            <div class="input-group">
                <input type="file" id="fileBackup" accept=".json" class="modern-input" style="padding: 10px; font-size: 0.8rem;">
            </div>

            <button class="btn-primary" style="background: #27ae60; margin-top: 15px;" onclick="importarBackup()">
                <i class="fas fa-upload"></i> IMPORTAR E SOBREPOR DADOS
            </button>
        </div>

    </main>

    <script src="js/db.js"></script>
    <script src="js/backup.js"></script>
</body>
</html>
