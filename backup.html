<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Backup Nuvem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .backup-icon { font-size: 3rem; color: #e63946; margin: 20px 0; display: block; text-align: center; }
        .info-text { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 25px; line-height: 1.4; }
        .section-title { color: white; font-size: 1rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .status-sync { color: #ffb703; font-size: 0.8rem; text-align: center; margin-top: 15px; display: none; font-weight: bold; }
        .progress-container { width: 100%; background: #333; height: 10px; border-radius: 5px; margin-top: 10px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #e63946; border-radius: 5px; transition: 0.3s; }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">BACKUP NUVEM</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <i class="fas fa-cloud-upload-alt backup-icon"></i>
        <p class="info-text">
            Importe o seu backup JSON para sincronizar com o Firebase. <br>
            Usuário: <b><span id="userEmail">...</span></b>
        </p>

        <div class="card">
            <div class="section-title" style="color: #27ae60;">
                <i class="fas fa-sync"></i> Sincronização Inteligente
            </div>
            
            <div class="input-group">
                <input type="file" id="fileBackup" accept=".json" class="modern-input" style="padding: 10px; font-size: 0.8rem;">
            </div>

            <button id="btnImport" class="btn-primary" style="background: #27ae60; margin-top: 15px;">
                <i class="fas fa-cloud-upload-alt"></i> INICIAR IMPORTAÇÃO
            </button>

            <div id="syncStatus" class="status-sync">Processando arquivo...</div>
            <div class="progress-container" id="progContainer">
                <div class="progress-bar" id="progBar"></div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else document.getElementById('userEmail').innerText = user.email;
        });

        document.getElementById('btnImport').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileBackup');
            const status = document.getElementById('syncStatus');
            const progBar = document.getElementById('progBar');
            const progContainer = document.getElementById('progContainer');
            
            if (!fileInput.files[0]) {
                alert("Selecione o arquivo de backup!");
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const dados = JSON.parse(e.target.result);
                    const emailAtual = auth.currentUser.email;

                    // Proteção contra campos nulos no JSON (Evita o erro de length)
                    const listaVeiculos = dados.vehicles || [];
                    const listaLogs = dados.logs || [];
                    const listaVistorias = dados.vistorias || [];
                    const listaManutencoes = dados.manutencoes || [];

                    const totalGeral = listaVeiculos.length + listaLogs.length + listaVistorias.length + listaManutencoes.length;
                    
                    if (totalGeral === 0) {
                        alert("Arquivo vazio ou formato não reconhecido.");
                        return;
                    }

                    status.style.display = "block";
                    progContainer.style.display = "block";
                    let processados = 0;

                    const atualizarProgresso = (nome) => {
                        processados++;
                        let porc = (processados / totalGeral) * 100;
                        progBar.style.width = porc + "%";
                        status.innerText = `Sincronizando ${nome}: ${processados} de ${totalGeral}...`;
                    };

                    // 1. VEÍCULOS (Evita duplicar placa)
                    const snapExistentes = await getDocs(query(collection(db, "veiculos"), where("usuario", "==", emailAtual)));
                    const placasExistentes = snapExistentes.docs.map(doc => doc.data().placa.toUpperCase());

                    for (let v of listaVeiculos) {
                        const placaFmt = v.placa.toUpperCase().trim();
                        if (!placasExistentes.includes(placaFmt)) {
                            await addDoc(collection(db, "veiculos"), {
                                placa: placaFmt,
                                nome: v.nome.toUpperCase(),
                                ano: v.ano || "N/A",
                                kmAtual: v.kmAtual || 0,
                                usuario: emailAtual
                            });
                            placasExistentes.push(placaFmt);
                        }
                        atualizarProgresso("Veículos");
                    }

                    // 2. MOVIMENTAÇÕES (logs -> movimentacoes)
                    for (let log of listaLogs) {
                        const dataObj = new Date(log.timestamp || Date.now());
                        await addDoc(collection(db, "movimentacoes"), {
                            veiculo: (log.viatura || log.veiculo || "DESCONHECIDO").toUpperCase(),
                            km: log.km || 0,
                            motorista: (log.motorista || "SISTEMA").toUpperCase(),
                            tipo: log.tipo || "N/A",
                            dataExibicao: log.data || dataObj.toLocaleString('pt-BR'),
                            dataISO: dataObj.toISOString().split('T')[0],
                            timestamp: log.timestamp || dataObj.getTime(),
                            usuario: emailAtual
                        });
                        atualizarProgresso("Movimentações");
                    }

                    // 3. VISTORIAS
                    for (let vis of listaVistorias) {
                        const dVis = new Date(vis.timestamp || Date.now());
                        await addDoc(collection(db, "vistorias"), {
                            veiculo: (vis.veiculo || vis.viatura || "DESCONHECIDO").toUpperCase(),
                            km: vis.km || 0,
                            vigilante: (vis.vigilante || vis.motorista || "SISTEMA").toUpperCase(),
                            checkList: vis.checkList || "OK",
                            obs: vis.obs || "",
                            dataExibicao: vis.data || dVis.toLocaleString('pt-BR'),
                            dataISO: dVis.toISOString().split('T')[0],
                            timestamp: vis.timestamp || dVis.getTime(),
                            usuario: emailAtual
                        });
                        atualizarProgresso("Vistorias");
                    }

                    // 4. MANUTENÇÕES
                    for (let m of listaManutencoes) {
                        const dM = new Date(m.timestamp || Date.now());
                        await addDoc(collection(db, "manutencoes"), {
                            ...m,
                            veiculo: (m.veiculo || m.viatura || "DESCONHECIDO").toUpperCase(),
                            dataExibicao: m.data || dM.toLocaleString('pt-BR'),
                            dataISO: dM.toISOString().split('T')[0],
                            usuario: emailAtual
                        });
                        atualizarProgresso("Manutenções");
                    }

                    alert("✅ Tudo pronto! Os dados foram vinculados ao seu usuário.");
                    location.reload();

                } catch (err) {
                    console.error(err);
                    alert("Erro crítico: " + err.message);
                }
            };
            reader.readAsText(fileInput.files[0]);
        });
    </script>
</body>
</html>
