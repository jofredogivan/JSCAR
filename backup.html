<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Backup Nuvem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .backup-icon { font-size: 3rem; color: #e63946; margin: 20px 0; display: block; text-align: center; }
        .info-text { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 25px; line-height: 1.4; }
        .status-sync { color: #ffb703; font-size: 0.8rem; text-align: center; margin-top: 15px; display: none; font-weight: bold; }
        .progress-container { width: 100%; background: #333; height: 12px; border-radius: 6px; margin-top: 10px; display: none; overflow: hidden; border: 1px solid #444; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #e63946, #ffb703); border-radius: 6px; transition: 0.2s; }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">BACKUP NUVEM</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        <i class="fas fa-cloud-upload-alt backup-icon"></i>
        <p class="info-text">Sincronizando backup para: <b><span id="userEmail">...</span></b></p>

        <div class="card">
            <div class="section-title" style="color: #27ae60; font-weight: bold; margin-bottom:10px;">
                <i class="fas fa-check-double"></i> Sincronização Sem Duplicados
            </div>
            
            <input type="file" id="fileBackup" accept=".json" class="modern-input" style="padding: 10px; font-size: 0.8rem; width: 100%;">

            <button id="btnImport" class="btn-primary" style="background: #27ae60; margin-top: 15px; width: 100%;">
                <i class="fas fa-cloud-upload-alt"></i> INICIAR IMPORTAÇÃO
            </button>

            <div id="syncStatus" class="status-sync">Validando dados...</div>
            <div class="progress-container" id="progContainer">
                <div class="progress-bar" id="progBar"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else document.getElementById('userEmail').innerText = user.email;
        });

        document.getElementById('btnImport').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileBackup');
            const status = document.getElementById('syncStatus');
            const progBar = document.getElementById('progBar');
            const progContainer = document.getElementById('progContainer');
            
            if (!fileInput.files[0]) { alert("Selecione o arquivo!"); return; }

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const dados = JSON.parse(e.target.result);
                    const emailAtual = auth.currentUser.email;

                    const vtrs = dados.vehicles || [];
                    const logs = dados.logs || [];
                    const vists = dados.vistorias || [];
                    const total = vtrs.length + logs.length + vists.length;

                    status.style.display = "block";
                    progContainer.style.display = "block";
                    let cont = 0;

                    // --- PASSO 1: LIMPAR DUPLICADOS DE VEÍCULOS ---
                    // Buscamos TODOS os veículos do banco para comparar placa
                    status.innerText = "Verificando veículos já cadastrados...";
                    const snapGeral = await getDocs(collection(db, "veiculos"));
                    const placasNoBanco = snapGeral.docs.map(d => d.data().placa.toUpperCase().trim());

                    for (let v of vtrs) {
                        const pFmt = v.placa.toUpperCase().trim();
                        // SÓ ADICIONA SE A PLACA NÃO EXISTIR EM NENHUM REGISTRO
                        if (!placasNoBanco.includes(pFmt)) {
                            await addDoc(collection(db, "veiculos"), {
                                placa: pFmt,
                                nome: v.nome.toUpperCase(),
                                ano: v.ano || "",
                                kmAtual: v.kmAtual || 0,
                                usuario: emailAtual
                            });
                            placasNoBanco.push(pFmt); // Adiciona na lista local para não repetir no mesmo loop
                        }
                        cont++; updateUI(cont, total);
                    }

                    // --- PASSO 2: LOGS E VISTORIAS ---
                    for (let l of logs) {
                        const d = new Date(l.timestamp || Date.now());
                        const payload = {
                            veiculo: (l.viatura || l.veiculo || "VTR").toUpperCase(),
                            km: l.km || 0,
                            motorista: (l.motorista || "SISTEMA").toUpperCase(),
                            tipo: l.tipo || "SAÍDA",
                            dataExibicao: l.data || d.toLocaleString('pt-BR'),
                            dataISO: d.toISOString().split('T')[0],
                            timestamp: l.timestamp || d.getTime(),
                            usuario: emailAtual
                        };

                        if (l.tipo === "VISTORIA") {
                            await addDoc(collection(db, "vistorias"), {
                                ...payload, vigilante: payload.motorista, checkList: "Backup", obs: ""
                            });
                        } else {
                            await addDoc(collection(db, "movimentacoes"), payload);
                        }
                        cont++; updateUI(cont, total);
                    }

                    alert("Sincronização concluída com sucesso!");
                    window.location.href = "index.html";

                } catch (err) { alert("Erro: " + err.message); }
            };

            function updateUI(c, t) {
                const p = (c / t) * 100;
                progBar.style.width = p + "%";
                status.innerText = `Sincronizando: ${c} de ${t}`;
            }

            reader.readAsText(fileInput.files[0]);
        });
    </script>
</body>
</html>
