<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Backup Nuvem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .backup-icon { font-size: 3rem; color: #e63946; margin: 20px 0; display: block; text-align: center; }
        .info-text { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 25px; line-height: 1.4; }
        .section-title { color: white; font-size: 1rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .status-sync { color: #ffb703; font-size: 0.8rem; text-align: center; margin-top: 15px; display: none; font-weight: bold; }
        .progress-container { width: 100%; background: #333; height: 10px; border-radius: 5px; margin-top: 10px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #e63946; border-radius: 5px; transition: 0.3s; }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">BACKUP NUVEM</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <i class="fas fa-cloud-upload-alt backup-icon"></i>
        <p class="info-text">
            Esta função irá "carimbar" seus dados antigos com seu e-mail (<b><span id="userEmail">...</span></b>) e subir para o novo servidor.
        </p>

        <div class="card">
            <div class="section-title" style="color: #27ae60;">
                <i class="fas fa-sync"></i> Migrar Dados para Firebase
            </div>
            <p style="color: #666; font-size: 0.75rem; margin-bottom: 15px;">
                Selecione o arquivo <b>.JSON</b> gerado pelo backup do sistema anterior.
            </p>
            
            <div class="input-group">
                <input type="file" id="fileBackup" accept=".json" class="modern-input" style="padding: 10px; font-size: 0.8rem;">
            </div>

            <button id="btnImport" class="btn-primary" style="background: #27ae60; margin-top: 15px;">
                <i class="fas fa-cloud-upload-alt"></i> INICIAR MIGRAÇÃO AGORA
            </button>

            <div id="syncStatus" class="status-sync">Preparando envio...</div>
            <div class="progress-container" id="progContainer">
                <div class="progress-bar" id="progBar"></div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById('userEmail').innerText = user.email;
            }
        });

        document.getElementById('btnImport').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileBackup');
            const status = document.getElementById('syncStatus');
            const progBar = document.getElementById('progBar');
            const progContainer = document.getElementById('progContainer');
            
            if (!fileInput.files[0]) {
                alert("Selecione o arquivo de backup primeiro!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async (e) => {
                try {
                    const dados = JSON.parse(e.target.result);
                    const emailAtual = auth.currentUser.email;
                    status.style.display = "block";
                    progContainer.style.display = "block";
                    
                    let totalItens = (dados.vehicles?.length || 0) + (dados.logs?.length || 0) + (dados.manutencoes?.length || 0);
                    let processados = 0;

                    const atualizarProgresso = () => {
                        processados++;
                        let porc = (processados / totalItens) * 100;
                        progBar.style.width = porc + "%";
                        status.innerText = `Sincronizando: ${processados} de ${totalItens}...`;
                    };

                    // 1. MIGRAÇÃO DE VEÍCULOS (vehicles no JSON antigo)
                    if (dados.vehicles) {
                        for (let v of dados.vehicles) {
                            await addDoc(collection(db, "veiculos"), {
                                placa: v.placa.toUpperCase(),
                                nome: v.nome.toUpperCase(),
                                ano: v.ano || "N/A",
                                kmAtual: v.kmAtual || 0,
                                usuario: emailAtual
                            });
                            atualizarProgresso();
                        }
                    }

                    // 2. MIGRAÇÃO DE MOVIMENTAÇÕES (logs no JSON antigo)
                    if (dados.logs) {
                        for (let log of dados.logs) {
                            // Gera campos de data compatíveis com os novos filtros
                            const dataObj = new Date(log.timestamp || Date.now());
                            await addDoc(collection(db, "movimentacoes"), {
                                veiculo: log.viatura.toUpperCase(),
                                km: log.km,
                                motorista: log.motorista.toUpperCase(),
                                tipo: log.tipo,
                                dataExibicao: log.data || dataObj.toLocaleString('pt-BR'),
                                dataISO: dataObj.toISOString(),
                                timestamp: log.timestamp || dataObj.getTime(),
                                usuario: emailAtual
                            });
                            atualizarProgresso();
                        }
                    }

                    // 3. MIGRAÇÃO DE MANUTENÇÕES (se houver)
                    if (dados.manutencoes) {
                        for (let m of dados.manutencoes) {
                            const dataObjM = new Date(m.timestamp || Date.now());
                            await addDoc(collection(db, "manutencoes"), {
                                ...m,
                                dataExibicao: m.data || dataObjM.toLocaleString('pt-BR'),
                                dataISO: dataObjM.toISOString(),
                                usuario: emailAtual
                            });
                            atualizarProgresso();
                        }
                    }

                    alert("✅ " + processados + " registros migrados com sucesso para o seu usuário!");
                    status.innerText = "Sincronização concluída!";
                    status.style.color = "#27ae60";
                    
                } catch (err) {
                    console.error(err);
                    alert("Erro crítico na migração: " + err.message);
                }
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
