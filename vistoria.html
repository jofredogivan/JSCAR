<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Vistoria</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area"><i class="fas fa-shield-alt logo-icon"></i><div><h2>JAPAN</h2><span>SECURITY</span></div></div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="vistoria.html" class="active"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Entrada/Saída</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar"><h1>Vistoria de Frota</h1></header>

        <section class="content-body">
            <div class="card form-card">
                <div class="card-header"><i class="fas fa-camera"></i> Novo Registro de Vistoria</div>
                <div class="row">
                    <div class="input-group">
                        <label>Veículo</label>
                        <input list="listaVeiculos" id="veiculo" class="modern-input" placeholder="Selecione..." onchange="puxarKmAutomatico()">
                        <datalist id="listaVeiculos"></datalist>
                    </div>
                    <div class="input-group"><label>KM Atual</label><input id="km" type="number" class="modern-input"></div>
                    <div class="input-group"><label>Vigilante</label><input id="vigilante" class="modern-input"></div>
                </div>
                
                <div class="row">
                    <div class="input-group">
                        <label>Foto da Avaria (Opcional)</label>
                        <input type="file" id="fotoVeiculo" class="modern-input" accept="image/*">
                    </div>
                </div>

                <div class="checklist-grid mt-20">
                    <label class="check-item"><input type="checkbox" id="oleo"> <span>Óleo</span></label>
                    <label class="check-item"><input type="checkbox" id="agua"> <span>Água</span></label>
                    <label class="check-item"><input type="checkbox" id="pneus"> <span>Pneus</span></label>
                    <label class="check-item"><input type="checkbox" id="limpeza"> <span>Limpeza</span></label>
                </div>
                <button class="btn-primary" onclick="salvar()"><i class="fas fa-save"></i> Salvar Vistoria</button>
            </div>

            <div class="card filter-card mt-20">
                <div class="card-header"><i class="fas fa-file-pdf"></i> Relatório PDF por Veículo</div>
                <div class="row">
                    <div class="input-group"><label>De:</label><input type="date" id="dataInicio" class="modern-input"></div>
                    <div class="input-group"><label>Até:</label><input type="date" id="dataFim" class="modern-input"></div>
                </div>
                <div style="padding: 0 20px 20px; display: flex; gap: 10px;">
                    <button class="btn-secondary" onclick="renderizarTabela()">Filtrar</button>
                    <button class="btn-accent" onclick="gerarPDF()">Gerar PDF por Carro</button>
                </div>
            </div>

            <div class="card table-card mt-20">
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Data/Hora</th>
                                <th>Veículo</th>
                                <th>Vigilante</th>
                                <th>KM</th>
                                <th>Checklist</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabela"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <script src="js/vistoria.js"></script>
</body>
</html>
