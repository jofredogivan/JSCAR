<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Vistoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="main-content">
        <header class="top-bar">
            <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Início</a>
            <h1>Vistoria</h1>
        </header>

        <div class="card">
            <div class="input-group">
                <label>Selecione o Veículo</label>
                <input list="listaVeiculos" id="veiculo" class="modern-input" onchange="carregarDadosVeiculo()">
                <datalist id="listaVeiculos"></datalist>
            </div>
            <button class="btn-primary" onclick="salvarVistoria()"><i class="fas fa-save"></i> Finalizar Vistoria</button>
        </div>
    </main>
    <script src="js/db.js"></script>
    <script src="js/vistoria.js"></script>
</body>
</html>
