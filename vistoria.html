<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Vistoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #e63946; --green: #2ecc71; --dark: #121212; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: #1a1a1a; padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; position: relative; }
        label { font-size: 0.7rem; color: var(--red); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .modern-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #222; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .check-container { display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 0.85rem; cursor: pointer; background: #2a2a2a; padding: 8px; border-radius: 5px; }
        .check-container input { width: 18px; height: 18px; accent-color: var(--red); }

        .btn-primary { border: none; border-radius: 8px; cursor: pointer; font-weight: 800; transition: 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; width: 100%; padding: 15px; }
        .btn-foto { background: #333; color: white; border: 1px dashed #e63946; margin-bottom: 10px; padding: 10px; }
        #preview-foto { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; display: none; border: 2px solid var(--red); }

        #lista_vtr { display: none; position: absolute; width: calc(100% - 36px); background: #222; border: 2px solid var(--red); z-index: 9999; max-height: 250px; overflow-y: auto; border-radius: 0 0 10px 10px; top: 75px; }
        #lista_vtr div { padding: 14px; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.95rem; color: #ccc; }
        #lista_vtr div:hover { background: var(--red); color: #fff; }

        table { width: 100%; border-collapse: collapse; background: #111; font-size: 0.75rem; margin-top: 10px; }
        th { background: #222; color: var(--red); padding: 10px; text-align: left; border-bottom: 2px solid var(--red); }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8rem;"><i class="fas fa-chevron-left"></i> VOLTAR</a>
            <div style="color: var(--red); font-weight: 900; letter-spacing: 2px;">VISTORIA TÉCNICA</div>
            <div style="width: 50px;"></div>
        </div>
    </header>

    <main class="container">
        <div class="card" style="border-color: var(--red);">
            <label><i class="fas fa-filter"></i> Filtrar Período (Início e Fim)</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="datetime-local" id="f_ini" class="modern-input">
                <input type="datetime-local" id="f_fim" class="modern-input">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btnFiltrar" class="btn-primary" style="background: #333; padding: 10px;">FILTRAR</button>
                <button id="btnExportarPDF" class="btn-primary" style="background: #34495e; padding: 10px;"><i class="fas fa-file-pdf"></i> GERAR PDF</button>
            </div>
        </div>

        <div class="card">
            <div style="position: relative;">
                <label>Viatura (Placa ou Nome)</label>
                <input type="text" id="v_veiculo" class="modern-input" placeholder="Clique para selecionar..." autocomplete="off">
                <div id="lista_vtr"></div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>KM Atual</label>
                    <input type="number" id="v_km" class="modern-input" placeholder="0">
                </div>
                <div style="flex: 1;">
                    <label>Vigilante</label>
                    <input type="text" id="v_vigilante" class="modern-input" placeholder="Nome">
                </div>
            </div>

            <label>Checklist Completo</label>
            <div class="checklist-grid">
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Água"> Água</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Óleo"> Óleo</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Macaco"> Macaco</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Triângulo"> Triângulo</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Farol Esq."> Farol Esq.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Farol Dir."> Farol Dir.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Lanterna Esq."> Lant. Esq.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Lanterna Dir."> Lant. Dir.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Pneus"> Pneus</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Limpeza"> Limpeza</label>
            </div>

            <label style="margin-top: 15px;">Observações de Avarias</label>
            <textarea id="v_obs" class="modern-input" rows="2" placeholder="Descreva amassados, riscos ou problemas..."></textarea>

            <label>Foto da Vistoria</label>
            <button class="btn-primary btn-foto" id="btnCâmera"><i class="fas fa-camera"></i> TIRAR FOTO</button>
            <input type="file" id="input_foto" accept="image/*" capture="camera" style="display: none;">
            <img id="preview-foto" src="">

            <button class="btn-primary" id="btnSalvarVistoria" style="background: var(--red);">
                <i class="fas fa-save"></i> FINALIZAR E SINCRONIZAR KM
            </button>
        </div>

        <div class="table-responsive">
            <table id="tabelaDados">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>VTR</th>
                        <th>Vigilante</th>
                        <th>KM</th>
                    </tr>
                </thead>
                <tbody id="tabelaVistoria"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let vtrCache = [];
        let historicoLocal = [];
        let filtradosPDF = [];
        let fotoBase64 = "";

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                carregarVeiculos().then(() => buscarVistorias()); 
            } else { window.location.href = "login.html"; }
        });

        async function carregarVeiculos() {
            const snap = await getDocs(collection(db, "veiculos"));
            vtrCache = [];
            const list = document.getElementById('lista_vtr');
            snap.forEach(d => {
                const i = d.data();
                const placa = i.placa || i.Placa;
                const nome = i.nome || i.Nome;
                if(placa && nome) {
                    vtrCache.push({ id: d.id, placa: placa.toUpperCase(), nome: nome.toUpperCase(), km: i.kmAtual || 0 });
                }
            });
        }

        // Lógica de Seleção de Veículo (Igual Entrada/Saída)
        const inputVtr = document.getElementById('v_veiculo');
        const boxVtr = document.getElementById('lista_vtr');
        inputVtr.oninput = () => {
            const f = inputVtr.value.toUpperCase();
            boxVtr.innerHTML = "";
            const encontrados = vtrCache.filter(v => v.placa.includes(f) || v.nome.includes(f));
            if(encontrados.length > 0) {
                encontrados.forEach(v => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${v.placa}</b> - ${v.nome}`;
                    d.onmousedown = () => {
                        inputVtr.value = `${v.placa} - ${v.nome}`;
                        document.getElementById('v_km').value = v.km;
                        boxVtr.style.display = 'none';
                    };
                    boxVtr.appendChild(d);
                });
                boxVtr.style.display = 'block';
            } else { boxVtr.style.display = 'none'; }
        };
        inputVtr.onblur = () => setTimeout(() => boxVtr.style.display = 'none', 200);

        // Lógica da Foto
        document.getElementById('btnCâmera').onclick = () => document.getElementById('input_foto').click();
        document.getElementById('input_foto').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                fotoBase64 = reader.result;
                const preview = document.getElementById('preview-foto');
                preview.src = fotoBase64;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        async function buscarVistorias() {
            const snap = await getDocs(collection(db, "vistorias"));
            historicoLocal = [];
            snap.forEach(doc => {
                const item = doc.data();
                if(item.usuario === auth.currentUser.email) {
                    // Trava de segurança para o Nome do Veículo
                    if (!item.nomeVeiculo || item.nomeVeiculo === "AVULSO") {
                        const find = vtrCache.find(v => v.placa === item.veiculo);
                        item.nomeVeiculo = find ? find.nome : "NÃO CADASTRADO";
                    }
                    historicoLocal.push({ id: doc.id, ...item });
                }
            });
            renderizar();
        }

        function renderizar() {
            const ini = document.getElementById('f_ini').value;
            const fim = document.getElementById('f_fim').value;
            const tsIni = ini ? new Date(ini).getTime() : 0;
            const tsFim = fim ? new Date(fim).getTime() : Infinity;

            const corpo = document.getElementById('tabelaVistoria');
            corpo.innerHTML = "";
            
            filtradosPDF = historicoLocal.filter(i => i.timestamp >= tsIni && i.timestamp <= tsFim).sort((a,b) => b.timestamp - a.timestamp);

            filtradosPDF.forEach(i => {
                corpo.innerHTML += `<tr>
                    <td style="color:#777; font-size:0.65rem;">${i.dataExibicao}</td>
                    <td><b>${i.veiculo}</b><br><small style="color:var(--red)">${i.nomeVeiculo}</small></td>
                    <td>${i.vigilante}</td>
                    <td>${i.km}</td>
                </tr>`;
            });
        }

        document.getElementById('btnFiltrar').onclick = renderizar;

        document.getElementById('btnSalvarVistoria').onclick = async () => {
            const valorInput = inputVtr.value.toUpperCase();
            const km = document.getElementById('v_km').value;
            const vig = document.getElementById('v_vigilante').value.toUpperCase();
            
            if(!valorInput || !km || !vig) return alert("Preencha Placa, KM e Vigilante!");

            const vEncontrado = vtrCache.find(v => valorInput.includes(v.placa));
            const placaFinal = vEncontrado ? vEncontrado.placa : valorInput;
            const nomeFinal = vEncontrado ? vEncontrado.nome : "AVULSO";

            const checks = [];
            document.querySelectorAll('.v_chk:checked').forEach(c => checks.push(c.getAttribute('data-label')));

            const dados = {
                veiculo: placaFinal,
                nomeVeiculo: nomeFinal,
                km: Number(km),
                vigilante: vig,
                checkList: checks.join(", "),
                obs: document.getElementById('v_obs').value.toUpperCase() || "SEM OBS",
                foto: fotoBase64,
                timestamp: new Date().getTime(),
                dataExibicao: new Date().toLocaleString('pt-BR'),
                usuario: auth.currentUser.email
            };

            try {
                await addDoc(collection(db, "vistorias"), dados);
                if(vEncontrado) {
                    await updateDoc(doc(db, "veiculos", vEncontrado.id), { kmAtual: Number(km) });
                }
                alert("Vistoria finalizada com sucesso!");
                location.reload();
            } catch (e) { alert("Erro ao salvar: " + e); }
        };

        document.getElementById('btnExportarPDF').onclick = () => {
            if(filtradosPDF.length === 0) return alert("Filtre os dados primeiro!");

            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF('l', 'mm', 'a4');
            const logoColor = [230, 57, 70];

            const grupos = {};
            filtradosPDF.forEach(v => {
                const key = `${v.veiculo} - ${v.nomeVeiculo}`;
                if(!grupos[key]) grupos[key] = [];
                grupos[key].push(v);
            });

            let yPos = 20;
            docPdf.setFontSize(22); docPdf.setTextColor(logoColor[0], logoColor[1], logoColor[2]);
            docPdf.text("JAPAN SECURITY", 14, yPos);
            docPdf.setFontSize(10); docPdf.setTextColor(100);
            docPdf.text("RELATÓRIO TÉCNICO DE VISTORIAS DE FROTA", 14, yPos + 7);
            yPos += 20;

            Object.keys(grupos).sort().forEach(vKey => {
                if(yPos > 170) { docPdf.addPage(); yPos = 20; }

                docPdf.setFillColor(240, 240, 240); docPdf.rect(14, yPos, 269, 8, 'F');
                docPdf.setTextColor(0); docPdf.setFontSize(11); docPdf.setFont("helvetica", "bold");
                docPdf.text(`VIATURA: ${vKey}`, 18, yPos + 6);
                yPos += 10;

                const rows = grupos[vKey].map(i => [
                    i.dataExibicao, i.vigilante, i.km + " KM", i.checkList, i.obs
                ]);

                docPdf.autoTable({
                    head: [["DATA/HORA", "VIGILANTE", "KM", "ITENS OK", "OBSERVAÇÕES"]],
                    body: rows,
                    startY: yPos,
                    theme: 'striped',
                    headStyles: { fillColor: logoColor },
                    styles: { fontSize: 8 },
                    didDrawPage: (data) => { yPos = data.cursor.y + 15; }
                });
            });

            docPdf.save("Relatorio_Vistorias_Japan.pdf");
        };
    </script>
</body>
</html>
