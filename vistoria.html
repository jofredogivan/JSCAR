<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Vistoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        .check-container { display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 0.8rem; cursor: pointer; }
        .check-container input { width: 18px; height: 18px; accent-color: #e63946; }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">VISTORIA</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <div class="card" style="margin-bottom: 15px; border: 1px solid #e63946; background: #1a1a1a;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label style="color: #e63946; font-size: 0.7rem; font-weight: bold;">FILTRAR VISTORIAS</label>
                <input list="listaVeiculos" id="f_placa" class="modern-input" placeholder="Todas as Viaturas">
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="f_data_ini" class="modern-input">
                    <input type="date" id="f_data_fim" class="modern-input">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-primary" id="btnFiltrar" style="background: #333;">
                        <i class="fas fa-search"></i> FILTRAR
                    </button>
                    <button class="btn-primary" id="btnExportarPDF" style="background: #34495e;">
                        <i class="fas fa-file-pdf"></i> GERAR PDF
                    </button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                
                <div class="input-group">
                    <label>Viatura</label>
                    <input list="listaVeiculos" id="v_veiculo" class="modern-input" placeholder="Selecione a placa...">
                    <datalist id="listaVeiculos"></datalist>
                </div>

                <div class="input-group" style="background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #333;">
                    <label style="font-size: 0.65rem; color: #e63946; font-weight: bold;">DATA/HORA DA VISTORIA</label>
                    <input type="datetime-local" id="v_data_retroativa" class="modern-input">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>KM Atual</label>
                        <input type="number" id="v_km" class="modern-input">
                    </div>
                    <div style="flex: 1;">
                        <label>Vigilante</label>
                        <input type="text" id="v_vigilante" class="modern-input" placeholder="Nome">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #252525; padding: 15px; border-radius: 10px; border: 1px solid #333;">
                    <label class="check-container"><input type="checkbox" class="v_chk" data-label="Óleo"> Óleo</label>
                    <label class="check-container"><input type="checkbox" class="v_chk" data-label="Água"> Água</label>
                    <label class="check-container"><input type="checkbox" class="v_chk" data-label="Pneus"> Pneus</label>
                    <label class="check-container"><input type="checkbox" class="v_chk" data-label="Limpeza"> Limpeza</label>
                    <label class="check-container"><input type="checkbox" class="v_chk" data-label="Faróis"> Faróis</label>
                    <label class="check-container"><input type="checkbox" class="v_chk" data-label="Lanternas"> Lanternas</label>
                </div>

                <div class="input-group">
                    <label>Observações Adicionais</label>
                    <textarea id="v_obs" class="modern-input" rows="2" placeholder="Descreva avarias ou detalhes..."></textarea>
                </div>

                <button class="btn-primary" id="btnSalvarVistoria" style="background: #e63946; padding: 15px;">
                    <i class="fas fa-check-circle"></i> FINALIZAR VISTORIA
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>VTR</th>
                        <th>Vigilante</th>
                    </tr>
                </thead>
                <tbody id="tabelaVistoria"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let dadosFiltrados = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarVeiculos();
                buscarVistorias();
            } else {
                window.location.href = "login.html";
            }
        });

        async function buscarVistorias() {
            const placa = document.getElementById('f_placa').value.toUpperCase();
            const dIni = document.getElementById('f_data_ini').value;
            const dFim = document.getElementById('f_data_fim').value;

            const q = query(collection(db, "vistorias"), where("usuario", "==", auth.currentUser.email), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            
            const corpo = document.getElementById('tabelaVistoria');
            corpo.innerHTML = "";
            dadosFiltrados = [];

            snap.forEach(doc => {
                const item = doc.data();
                const dataISO = item.dataISO ? item.dataISO.split('T')[0] : "";
                
                const batePlaca = placa === "" || item.veiculo.includes(placa);
                const bateData = (!dIni || dataISO >= dIni) && (!dFim || dataISO <= dFim);

                if (batePlaca && bateData) {
                    dadosFiltrados.push(item);
                    corpo.innerHTML += `<tr>
                        <td style="font-size:0.7rem">${item.dataExibicao}</td>
                        <td><b>${item.veiculo}</b></td>
                        <td style="font-size:0.7rem">${item.vigilante}</td>
                    </tr>`;
                }
            });
        }

        document.getElementById('btnFiltrar').onclick = buscarVistorias;

        document.getElementById('btnSalvarVistoria').onclick = async () => {
            const btn = document.getElementById('btnSalvarVistoria');
            const dataRetro = document.getElementById('v_data_retroativa').value;
            const dataObj = dataRetro ? new Date(dataRetro) : new Date();

            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            const checks = [];
            document.querySelectorAll('.v_chk').forEach(c => {
                if(c.checked) checks.push(c.getAttribute('data-label'));
            });

            const dados = {
                veiculo: document.getElementById('v_veiculo').value.toUpperCase(),
                km: document.getElementById('v_km').value || "N/A",
                vigilante: document.getElementById('v_vigilante').value.toUpperCase(),
                checkList: checks.join(", "),
                obs: document.getElementById('v_obs').value.toUpperCase() || "SEM OBS",
                dataExibicao: dataObj.toLocaleString('pt-BR'),
                dataISO: dataObj.toISOString(),
                timestamp: dataObj.getTime(),
                usuario: auth.currentUser.email
            };

            try {
                await addDoc(collection(db, "vistorias"), dados);
                alert("Vistoria finalizada com sucesso!");
                location.reload();
            } catch (e) {
                alert("Erro: " + e);
                btn.disabled = false;
            }
        };

        document.getElementById('btnExportarPDF').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(26, 26, 26);
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(230, 57, 70);
            doc.setFontSize(22);
            doc.text("JAPAN SECURITY", 14, 18);
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text("RELATÓRIO TÉCNICO DE VISTORIA DE FROTA", 14, 28);

            const colunas = ["Data", "VTR", "Vigilante", "KM", "Itens OK", "Obs"];
            const linhas = dadosFiltrados.map(i => [
                i.dataExibicao, i.veiculo, i.vigilante, i.km, i.checkList, i.obs
            ]);

            doc.autoTable({
                head: [colunas],
                body: linhas,
                startY: 40,
                headStyles: { fillColor: [230, 57, 70] },
                styles: { fontSize: 7 },
                columnStyles: { 4: { cellWidth: 40 }, 5: { cellWidth: 30 } }
            });

            doc.save(`vistoria_${new Date().getTime()}.pdf`);
        };

        async function carregarVeiculos() {
            const q = query(collection(db, "veiculos"), where("usuario", "==", auth.currentUser.email));
            const snap = await getDocs(q);
            const list = document.getElementById('listaVeiculos');
            snap.forEach(doc => { list.innerHTML += `<option value="${doc.data().placa}">`; });
        }
    </script>
</body>
</html>
