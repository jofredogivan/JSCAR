<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Vistoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #e63946; --dark: #121212; --card: #1e1e1e; --border: #333; --green: #27ae60; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #000; height: 100vh; border-right: 1px solid var(--border); position: fixed; }
        .sidebar-nav a { display: block; padding: 15px 20px; color: #888; text-decoration: none; border-left: 4px solid transparent; }
        .sidebar-nav a.active { color: white; background: rgba(230,57,70,0.1); border-left-color: var(--red); }
        .main { flex: 1; margin-left: 250px; padding: 30px; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .modern-input { width: 100%; background: #2a2a2a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 4px; box-sizing: border-box; }
        .checklist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; padding: 15px; background: #151515; border-radius: 5px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #ccc; cursor: pointer; }
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; justify-content: center; transition: 0.3s; }
        .btn-save { background: var(--red); width: 100%; margin-top: 20px; }
        .btn-camera { background: #444; margin-top: 10px; width: 100%; border: 1px dashed #666; }
        .btn-pdf { background: var(--green); }
        .filter-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; align-items: flex-end; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #888; padding: 12px; border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        #preview { width: 100%; max-height: 150px; object-fit: contain; margin-top: 10px; display: none; border-radius: 5px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 15px; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="padding: 30px; text-align: center;"><h2 style="color:var(--red); margin:0;">JAPAN</h2><span style="font-size:10px;">SECURITY</span></div>
        <nav class="sidebar-nav">
            <a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Movimentação</a>
            <a href="vistoria.html" class="active"><i class="fas fa-clipboard-check"></i> Vistoria</a>
            <a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a>
        </nav>
    </aside>

    <main class="main">
        <div class="card">
            <h4 style="margin-top:0; color:var(--red);">Nova Vistoria com Foto</h4>
            <div class="grid-inputs">
                <div><label>Viatura</label><input id="veiculo" class="modern-input" list="listaVeiculos"><datalist id="listaVeiculos"></datalist></div>
                <div><label>KM</label><input id="km" type="number" class="modern-input"></div>
                <div><label>Vigilante</label><input id="vigilante" class="modern-input"></div>
            </div>
            
            <div class="checklist-grid">
                <label class="check-item"><input type="checkbox" id="oleo"> Óleo</label>
                <label class="check-item"><input type="checkbox" id="agua"> Água</label>
                <label class="check-item"><input type="checkbox" id="f_esq"> Farol Esq.</label>
                <label class="check-item"><input type="checkbox" id="f_dir"> Farol Dir.</label>
                <label class="check-item"><input type="checkbox" id="l_esq"> Lant. Esq.</label>
                <label class="check-item"><input type="checkbox" id="l_dir"> Lant. Dir.</label>
            </div>

            <label class="btn btn-camera">
                <i class="fas fa-camera"></i> TIRAR FOTO / ANEXAR
                <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none" onchange="previewImagem(this)">
            </label>
            <img id="preview" alt="Preview da Foto">

            <button class="btn btn-save" onclick="salvarVistoria()"><i class="fas fa-save"></i> FINALIZAR VISTORIA</button>
        </div>

        <div class="card">
            <div class="filter-bar">
                <div><label>Data Início</label><input id="f_data_ini" type="date" class="modern-input"></div>
                <div><label>Data Fim</label><input id="f_data_fim" type="date" class="modern-input"></div>
                <button class="btn btn-pdf" onclick="gerarVistoriaPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
            <table>
                <thead><tr><th>Data</th><th>Veículo</th><th>KM</th><th>Foto</th><th>Ação</th></tr></thead>
                <tbody id="tabelaVistoria"></tbody>
            </table>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/vistoria.js"></script>
</body>
</html>
