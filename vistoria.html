<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Vistoria Técnica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #e63946; --dark: #121212; --card-bg: #1a1a1a; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: var(--card-bg); padding: 15px; text-align: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 900px; margin: auto; }
        
        .card { background: var(--card-bg); padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; position: relative; }
        label { font-size: 0.7rem; color: var(--red); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        .modern-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        .modern-input:focus { border-color: var(--red); outline: none; }

        /* Lista de Sugestão de Veículos */
        #lista_vtr { 
            display: none; position: absolute; width: calc(100% - 36px); 
            background: #222; border: 2px solid var(--red); z-index: 9999; 
            max-height: 200px; overflow-y: auto; border-radius: 0 0 10px 10px; top: 75px; 
        }
        #lista_vtr div { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        #lista_vtr div:hover { background: var(--red); }

        /* Checklist Grid */
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #222; padding: 12px; border-radius: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; background: #2a2a2a; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .check-item input { width: 18px; height: 18px; accent-color: var(--red); }

        /* Botões */
        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 800; padding: 15px; width: 100%; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: var(--red); color: white; margin-top: 15px; }
        .btn-photo { background: #333; border: 1px dashed var(--red); color: #fff; margin: 10px 0; }
        
        #preview-foto { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 2px solid var(--red); }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 20px; }
        th { background: #222; color: var(--red); padding: 12px; text-align: left; border-bottom: 2px solid var(--red); }
        td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; justify-content: space-between; max-width: 900px; margin: auto;">
            <a href="index.html" style="color: #fff; text-decoration: none;"><i class="fas fa-arrow-left"></i></a>
            <div style="color: var(--red); font-weight: 900; letter-spacing: 2px;">VISTORIA DE FROTA</div>
            <div style="width: 20px;"></div>
        </div>
    </header>

    <main class="container">
        <div class="card" style="border-left: 5px solid var(--red);">
            <label>Filtrar por Período (Data e Hora)</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="datetime-local" id="f_ini" class="modern-input">
                <input type="datetime-local" id="f_fim" class="modern-input">
            </div>
            <button id="btnExportarPDF" class="btn" style="background: #34495e; padding: 10px; font-size: 0.8rem;">
                <i class="fas fa-file-pdf"></i> GERAR RELATÓRIO FOTOGRÁFICO
            </button>
        </div>

        <div class="card">
            <div style="position: relative;">
                <label>Viatura</label>
                <input type="text" id="v_veiculo" class="modern-input" placeholder="Digite placa ou nome..." autocomplete="off">
                <div id="lista_vtr"></div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>KM Atual</label>
                    <input type="number" id="v_km" class="modern-input">
                </div>
                <div style="flex: 1;">
                    <label>Vigilante</label>
                    <input type="text" id="v_vigilante" class="modern-input">
                </div>
            </div>

            <label>Checklist de Segurança</label>
            <div class="checklist-grid">
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Água"> Água</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Óleo"> Óleo</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Macaco"> Macaco</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Triângulo"> Triângulo</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Faróis"> Faróis</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Lanternas"> Lanternas</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Pneus"> Pneus</label>
                <label class="check-item"><input type="checkbox" class="v_chk" data-label="Limpeza"> Limpeza</label>
            </div>

            <label style="margin-top: 15px;">Observações / Avarias</label>
            <textarea id="v_obs" class="modern-input" rows="2" placeholder="Descreva riscos, amassados ou pendências..."></textarea>

            <label>Evidência Fotográfica</label>
            <button class="btn btn-photo" id="btnCâmera"><i class="fas fa-camera"></i> TIRAR FOTO</button>
            <input type="file" id="input_foto" accept="image/*" capture="camera" style="display: none;">
            <img id="preview-foto" src="">

            <button id="btnSalvarVistoria" class="btn btn-save">
                <i class="fas fa-check-circle"></i> FINALIZAR E ATUALIZAR FROTA
            </button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Viatura</th>
                        <th>Vigilante</th>
                        <th>KM</th>
                    </tr>
                </thead>
                <tbody id="tabelaVistoria"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let vtrCache = [];
        let historicoLocal = [];
        let fotoBase64 = "";

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                carregarVeiculos().then(() => carregarVistorias()); 
            } else { window.location.href = "login.html"; }
        });

        // --- BUSCA DE VEÍCULOS ---
        async function carregarVeiculos() {
            const snap = await getDocs(collection(db, "veiculos"));
            vtrCache = [];
            const list = document.getElementById('lista_vtr');
            snap.forEach(d => {
                const i = d.data();
                vtrCache.push({ id: d.id, placa: i.placa.toUpperCase(), nome: i.nome.toUpperCase(), km: i.kmAtual || 0 });
            });
        }

        const inputVtr = document.getElementById('v_veiculo');
        const boxVtr = document.getElementById('lista_vtr');

        inputVtr.oninput = () => {
            const val = inputVtr.value.toUpperCase();
            boxVtr.innerHTML = "";
            if(!val) { boxVtr.style.display = 'none'; return; }
            const filtros = vtrCache.filter(v => v.placa.includes(val) || v.nome.includes(val));
            filtros.forEach(v => {
                const div = document.createElement('div');
                div.innerHTML = `<b>${v.placa}</b> - ${v.nome}`;
                div.onmousedown = () => {
                    inputVtr.value = `${v.placa} - ${v.nome}`;
                    document.getElementById('v_km').value = v.km;
                    boxVtr.style.display = 'none';
                };
                boxVtr.appendChild(div);
            });
            boxVtr.style.display = filtros.length ? 'block' : 'none';
        };
        inputVtr.onblur = () => setTimeout(() => boxVtr.style.display = 'none', 200);

        // --- CÂMERA ---
        document.getElementById('btnCâmera').onclick = () => document.getElementById('input_foto').click();
        document.getElementById('input_foto').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                fotoBase64 = reader.result;
                const img = document.getElementById('preview-foto');
                img.src = fotoBase64;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        // --- SALVAR ---
        document.getElementById('btnSalvarVistoria').onclick = async () => {
            const btn = document.getElementById('btnSalvarVistoria');
            const vtrTexto = inputVtr.value.toUpperCase();
            const km = document.getElementById('v_km').value;
            const vigilante = document.getElementById('v_vigilante').value.toUpperCase();

            if(!vtrTexto || !km || !vigilante) return alert("Preencha os campos obrigatórios!");

            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> SALVANDO...";

            const vEncontrado = vtrCache.find(v => vtrTexto.includes(v.placa));
            const checks = [];
            document.querySelectorAll('.v_chk:checked').forEach(c => checks.push(c.getAttribute('data-label')));

            const dados = {
                veiculo: vEncontrado ? vEncontrado.placa : vtrTexto,
                nomeVeiculo: vEncontrado ? vEncontrado.nome : "AVULSO",
                km: Number(km),
                vigilante: vigilante,
                checkList: checks.join(", "),
                obs: document.getElementById('v_obs').value.toUpperCase() || "SEM OBS",
                foto: fotoBase64,
                timestamp: new Date().getTime(),
                dataExibicao: new Date().toLocaleString('pt-BR'),
                usuario: auth.currentUser.email
            };

            try {
                await addDoc(collection(db, "vistorias"), dados);
                if(vEncontrado) {
                    await updateDoc(doc(db, "veiculos", vEncontrado.id), { kmAtual: Number(km) });
                }
                alert("Vistoria salva com sucesso!");
                location.reload();
            } catch (e) { alert("Erro: " + e); btn.disabled = false; }
        };

        // --- HISTÓRICO ---
        async function carregarVistorias() {
            const q = query(collection(db, "vistorias"), where("usuario", "==", auth.currentUser.email), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const corpo = document.getElementById('tabelaVistoria');
            corpo.innerHTML = "";
            historicoLocal = [];
            snap.forEach(d => {
                const i = d.data();
                historicoLocal.push(i);
                corpo.innerHTML += `<tr>
                    <td>${i.dataExibicao}</td>
                    <td><b>${i.veiculo}</b><br><small>${i.nomeVeiculo}</small></td>
                    <td>${i.vigilante}</td>
                    <td>${i.km}</td>
                </tr>`;
            });
        }

        // --- PDF COM FOTOS ---
        document.getElementById('btnExportarPDF').onclick = () => {
            if(historicoLocal.length === 0) return alert("Sem dados para exportar.");
            
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF('l', 'mm', 'a4');
            
            docPdf.setFontSize(18);
            docPdf.setTextColor(230, 57, 70);
            docPdf.text("JAPAN SECURITY - RELATÓRIO TÉCNICO DE VISTORIA", 14, 20);

            const rows = historicoLocal.map(i => [
                i.dataExibicao,
                `${i.veiculo}\n${i.nomeVeiculo}`,
                i.vigilante,
                i.km,
                i.checkList,
                i.obs,
                "" // Coluna da Foto
            ]);

            docPdf.autoTable({
                head: [["DATA/HORA", "VIATURA", "VIGILANTE", "KM", "CHECKLIST", "OBS", "FOTO"]],
                body: rows,
                startY: 30,
                styles: { fontSize: 7, valign: 'middle', minCellHeight: 22 },
                columnStyles: { 6: { cellWidth: 30 } },
                didDrawCell: (data) => {
                    if (data.column.index === 6 && data.cell.section === 'body') {
                        const imgData = historicoLocal[data.row.index].foto;
                        if (imgData) {
                            docPdf.addImage(imgData, 'JPEG', data.cell.x + 2, data.cell.y + 2, 26, 18);
                        }
                    }
                }
            });

            docPdf.save(`Vistoria_Japan_${new Date().getTime()}.pdf`);
        };
    </script>
</body>
</html>
