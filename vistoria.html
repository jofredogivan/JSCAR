<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Vistoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #e63946; --red-dark: #b91c1c; --dark: #121212; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: #1a1a1a; padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        label { font-size: 0.7rem; color: var(--red); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .modern-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        .btn-primary { border: none; border-radius: 8px; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; width: 100%; padding: 15px; transition: all 0.1s active; }
        .btn-primary:active { transform: scale(0.96); opacity: 0.8; }
        #lista_vtr { display: none; position: absolute; width: 100%; background: #222; border: 2px solid var(--red); z-index: 9999; max-height: 250px; overflow-y: auto; border-radius: 8px; top: 70px; }
        #lista_vtr div { padding: 14px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; }
        #lista_vtr div:hover { background: var(--red); color: #fff; }
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #222; padding: 15px; border-radius: 10px; }
        .check-container { display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 0.85rem; cursor: pointer; background: #2a2a2a; padding: 8px; border-radius: 5px; }
        .check-container input { width: 18px; height: 18px; accent-color: var(--red); }
        #preview-foto { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; display: none; border: 2px solid var(--red); }
        table { width: 100%; border-collapse: collapse; background: #111; font-size: 0.75rem; margin-top: 10px; }
        th { background: #222; color: var(--red); padding: 10px; text-align: left; border-bottom: 2px solid var(--red); }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .btn-excluir { color: #444; background: none; border: none; cursor: pointer; float: right; padding: 5px; }
        .btn-excluir:hover { color: var(--red); }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8rem;"><i class="fas fa-chevron-left"></i> VOLTAR</a>
            <div style="color: var(--red); font-weight: 900; letter-spacing: 2px;">VISTORIA TÉCNICA</div>
            <div style="width: 50px;"></div>
        </div>
    </header>

    <main class="container">
        <div class="card" style="border-color: var(--red);">
            <label><i class="fas fa-filter"></i> Período do Relatório</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="datetime-local" id="f_ini" class="modern-input">
                <input type="datetime-local" id="f_fim" class="modern-input">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btnFiltrar" class="btn-primary" style="background: #333; padding: 10px; color: #fff;">FILTRAR</button>
                <button id="btnExportarPDF" class="btn-primary" style="background: #34495e; padding: 10px; color: #fff;"><i class="fas fa-file-pdf"></i> GERAR PDF</button>
            </div>
        </div>

        <div class="card">
            <div style="position: relative;">
                <label>Viatura</label>
                <input type="text" id="v_veiculo" class="modern-input" placeholder="Selecione a viatura..." autocomplete="off">
                <div id="lista_vtr"></div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label>KM Atual</label><input type="number" id="v_km" class="modern-input"></div>
                <div style="flex: 1;"><label>Vigilante</label><input type="text" id="v_vigilante" class="modern-input"></div>
            </div>

            <label>Checklist Completo</label>
            <div class="checklist-grid">
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Água"> Água</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Óleo"> Óleo</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Macaco"> Macaco</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Triângulo"> Triângulo</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Farol Esq."> Farol Esq.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Farol Dir."> Farol Dir.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Lant. Esq."> Lant. Esq.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Lant. Dir."> Lant. Dir.</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Pneus"> Pneus</label>
                <label class="check-container"><input type="checkbox" class="v_chk" data-label="Limpeza"> Limpeza</label>
            </div>

            <label style="margin-top: 15px;">Observações</label>
            <textarea id="v_obs" class="modern-input" rows="2"></textarea>

            <button class="btn-primary" id="btnCâmera" style="background: #333; margin-bottom: 10px;"><i class="fas fa-camera"></i> FOTO DA VTR</button>
            <input type="file" id="input_foto" accept="image/*" capture="camera" style="display: none;">
            <img id="preview-foto">

            <button class="btn-primary" id="btnSalvarVistoria" style="background: var(--red); color: white;">
                <i class="fas fa-save"></i> FINALIZAR VISTORIA
            </button>
        </div>

        <table id="minhaTabela">
            <thead><tr><th>Data</th><th>Viatura</th><th>Vigilante</th><th>KM</th></tr></thead>
            <tbody id="tabelaVistoria"></tbody>
        </table>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let vtrCache = [];
        let historicoLocal = [];
        let fotoBase64 = "";

        onAuthStateChanged(auth, (u) => { if(u) { carregarVeiculos(); carregarHistorico(); } else { window.location.href="login.html"; }});

        async function carregarVeiculos() {
            const snap = await getDocs(collection(db, "veiculos"));
            vtrCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar();
        }

        async function carregarHistorico() {
            const snap = await getDocs(collection(db, "vistorias"));
            historicoLocal = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(i => i.usuario === auth.currentUser.email);
            renderizar();
        }

        function formatarNomeVeiculo(vtrTexto) {
            if (vtrTexto.includes(" - ")) return vtrTexto;
            const busca = vtrCache.find(v => v.placa === vtrTexto.trim());
            return busca ? `${busca.placa} - ${busca.nome}` : vtrTexto;
        }

        const inputVtr = document.getElementById('v_veiculo');
        const boxVtr = document.getElementById('lista_vtr');
        inputVtr.onclick = () => exibirSugestoes("");
        inputVtr.oninput = (e) => exibirSugestoes(e.target.value.toUpperCase());

        function exibirSugestoes(val) {
            boxVtr.innerHTML = "";
            const filtrados = vtrCache.filter(v => v.placa.includes(val) || v.nome.toUpperCase().includes(val));
            filtrados.forEach(v => {
                const d = document.createElement('div');
                d.innerHTML = `<b>${v.placa}</b> - ${v.nome}`;
                d.onmousedown = () => {
                    inputVtr.value = `${v.placa} - ${v.nome}`;
                    document.getElementById('v_km').value = v.kmAtual || 0;
                    boxVtr.style.display = 'none';
                };
                boxVtr.appendChild(d);
            });
            boxVtr.style.display = filtrados.length ? 'block' : 'none';
        }

        document.getElementById('btnCâmera').onclick = () => document.getElementById('input_foto').click();
        document.getElementById('input_foto').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                fotoBase64 = reader.result;
                document.getElementById('preview-foto').src = fotoBase64;
                document.getElementById('preview-foto').style.display = 'block';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        window.excluirVistoria = async (id) => {
            if(confirm("Excluir vistoria?")) { await deleteDoc(doc(db, "vistorias", id)); carregarHistorico(); }
        };

        function renderizar() {
            const corpo = document.getElementById('tabelaVistoria');
            corpo.innerHTML = "";
            historicoLocal.sort((a,b) => b.timestamp - a.timestamp).forEach(i => {
                corpo.innerHTML += `<tr>
                    <td>${i.dataExibicao.split(' ')[0]}</td>
                    <td><b>${formatarNomeVeiculo(i.veiculo)}</b></td>
                    <td>${i.vigilante}</td>
                    <td>${i.km} <button class="btn-excluir" onclick="excluirVistoria('${i.id}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
        }

        document.getElementById('btnSalvarVistoria').onclick = async () => {
            const vtrVal = inputVtr.value.toUpperCase();
            const km = document.getElementById('v_km').value;
            const vig = document.getElementById('v_vigilante').value.toUpperCase();
            if(!vtrVal || !km || !vig) return alert("Preencha tudo!");

            const checks = [];
            document.querySelectorAll('.v_chk').forEach(c => checks.push(`${c.dataset.label}: ${c.checked ? 'OK' : 'X'}`));

            try {
                await addDoc(collection(db, "vistorias"), {
                    veiculo: vtrVal,
                    km: Number(km),
                    vigilante: vig,
                    checkList: checks.join(" | "),
                    obs: document.getElementById('v_obs').value.toUpperCase() || "SEM OBS",
                    foto: fotoBase64,
                    timestamp: Date.now(),
                    dataExibicao: new Date().toLocaleString('pt-BR'),
                    usuario: auth.currentUser.email
                });
                alert("Sucesso!"); location.reload();
            } catch (e) { alert("Erro!"); }
        };

        document.getElementById('btnExportarPDF').onclick = () => {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();
            docPdf.setFillColor(230, 57, 70);
            docPdf.rect(0, 0, 210, 30, 'F');
            docPdf.setTextColor(255);
            docPdf.text("JAPAN SECURITY - RELATÓRIO DE VISTORIA", 10, 20);

            let y = 45;
            historicoLocal.forEach(i => {
                if(y > 250) { docPdf.addPage(); y = 20; }
                docPdf.setTextColor(0);
                docPdf.setFont(undefined, 'bold');
                docPdf.text(`VTR: ${formatarNomeVeiculo(i.veiculo)}`, 10, y);
                docPdf.setFont(undefined, 'normal');
                y += 6;
                docPdf.setFontSize(10);
                docPdf.text(`Data: ${i.dataExibicao} | Vigilante: ${i.vigilante} | KM: ${i.km}`, 10, y);
                y += 6;
                docPdf.text(`Checklist: ${i.checkList}`, 10, y, { maxWidth: 180 });
                y += 10;
                docPdf.line(10, y, 200, y);
                y += 10;
            });
            docPdf.save("Vistorias.pdf");
        };
    </script>
</body>
</html>
