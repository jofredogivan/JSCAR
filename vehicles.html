<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Japan Security | Frota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> </head>
<body>
    <div class="main-container">
        <div class="card">
            <h4 id="title">Cadastrar Veículo</h4>
            <input type="hidden" id="vId">
            <div class="grid">
                <input id="nome" placeholder="Modelo">
                <input id="placa" placeholder="Placa">
                <input id="ano" type="number" placeholder="Ano">
                <input id="km" type="number" placeholder="KM Inicial">
            </div>
            <button onclick="salvar()">SALVAR VEÍCULO</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Modelo</th><th>Placa</th><th>Ano</th><th>KM</th><th>Ação</th></tr></thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>
    <script src="js/db.js"></script>
    <script src="js/vehicles.js"></script>
</body>
</html>
