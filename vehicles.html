<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Veículos</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-sidebar">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>JAPAN</h2></div>
        <nav class="sidebar-nav"><ul><li><a href="index.html"><i class="fas fa-home"></i> Menu</a></li></ul></nav>
    </aside>
    <main class="main-content">
        <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Menu</a>
        <header class="top-bar"><h1>Cadastro de Viaturas</h1></header>
        <div class="card form-card">
            <div class="row">
                <div class="input-group"><label>Veículo (Nome)</label><input id="nome" class="modern-input" placeholder="Ex: Gol G6"></div>
                <div class="input-group"><label>Placa</label><input id="placa" class="modern-input" placeholder="ABC-1234"></div>
            </div>
            <div class="row">
                <div class="input-group"><label>KM Inicial</label><input id="kmAtual" type="number" class="modern-input"></div>
                <div class="input-group"><label>Próxima Troca Óleo (KM)</label><input id="kmTroca" type="number" class="modern-input"></div>
            </div>
            <button class="btn-primary" onclick="salvarVeiculo()"><i class="fas fa-save"></i> Salvar Veículo</button>
        </div>
        <div class="card table-card"><tbody id="tabelaVeiculos"></tbody></table></div>
    </main>
    <script src="js/vehicles.js"></script>
</body>
</html>
