<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Frota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .btn-excluir { color: #888; cursor: pointer; padding: 5px; }
        .btn-excluir:hover { color: #e63946; }
        .btn-edit { color: #3498db; cursor: pointer; padding: 5px; margin-right: 10px; }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">FROTA</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <div class="card" style="margin-bottom: 15px;">
            <div class="input-group">
                <label style="color: #888; font-size: 0.7rem; text-transform: uppercase;">Pesquisar Viatura</label>
                <input type="text" id="filtroFrota" class="modern-input" placeholder="Placa ou modelo...">
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div id="formTitle" style="color: #e63946; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase;">
                <i class="fas fa-plus-circle"></i> Gerenciar Veículo
            </div>
            
            <input type="hidden" id="veiculoId">

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div class="input-group">
                    <label>Modelo / Nome VTR</label>
                    <input type="text" id="nome" class="modern-input" placeholder="Ex: Gol VTR 01">
                </div>
                <div class="input-group">
                    <label>Placa</label>
                    <input type="text" id="placa" class="modern-input" placeholder="ABC-1234">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Ano</label>
                        <input type="text" id="ano" class="modern-input" placeholder="2023">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>KM Inicial</label>
                        <input type="number" id="kmAtual" class="modern-input" placeholder="0">
                    </div>
                </div>
                
                <button class="btn-primary" id="btnSalvarVeiculo" style="background: #e63946;">
                    <i class="fas fa-save"></i> SALVAR VEÍCULO
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Modelo</th>
                        <th>Placa</th>
                        <th>KM</th>
                        <th style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaVeiculos"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                listarVeiculos();
            } else {
                window.location.href = "login.html";
            }
        });

        // Salvar ou Atualizar
        document.getElementById('btnSalvarVeiculo').onclick = async () => {
            const id = document.getElementById('veiculoId').value;
            const dados = {
                nome: document.getElementById('nome').value.toUpperCase(),
                placa: document.getElementById('placa').value.toUpperCase(),
                ano: document.getElementById('ano').value,
                km: document.getElementById('kmAtual').value,
                usuario: auth.currentUser.email
            };

            if (id) {
                await updateDoc(doc(db, "veiculos", id), dados);
                alert("Veículo atualizado!");
            } else {
                await addDoc(collection(db, "veiculos"), dados);
                alert("Veículo cadastrado!");
            }
            location.reload();
        };

        // Listar Veículos
        async function listarVeiculos() {
            const q = query(collection(db, "veiculos"), where("usuario", "==", auth.currentUser.email));
            const snap = await getDocs(q);
            const corpo = document.getElementById('tabelaVeiculos');
            corpo.innerHTML = "";

            snap.forEach(documento => {
                const v = documento.data();
                const id = documento.id;
                corpo.innerHTML += `
                    <tr>
                        <td>${v.nome}</td>
                        <td><b>${v.placa}</b></td>
                        <td>${v.km}</td>
                        <td style="text-align: right;">
                            <i class="fas fa-trash btn-excluir" onclick="excluirVeiculo('${id}')"></i>
                        </td>
                    </tr>`;
            });
        }

        // Função global para excluir (precisa estar no window para o onclick do HTML achar)
        window.excluirVeiculo = async (id) => {
            if (confirm("Deseja realmente remover este veículo?")) {
                await deleteDoc(doc(db, "veiculos", id));
                location.reload();
            }
        };

        // Filtro Local
        document.getElementById('filtroFrota').onkeyup = function() {
            const filter = this.value.toUpperCase();
            const tr = document.querySelectorAll("#tabelaVeiculos tr");
            tr.forEach(row => {
                row.style.display = row.innerText.toUpperCase().includes(filter) ? "" : "none";
            });
        };
    </script>
</body>
</html>
