<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Veículos</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Movimentação</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html" class="active"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Menu</a>
        
        <header class="top-bar">
            <h1>Gestão da Frota</h1>
        </header>

        <section class="content-body">
            <div class="card form-card">
                <div class="card-header"><i class="fas fa-plus-circle"></i> Cadastrar Nova Viatura</div>
                
                <div class="row">
                    <div class="input-group">
                        <label>Placa</label>
                        <input id="placa" class="modern-input" placeholder="ABC-1234" style="text-transform: uppercase;">
                    </div>
                    <div class="input-group">
                        <label>Nome / Identificação</label>
                        <input id="nome" class="modern-input" placeholder="Ex: VTR 01 - Gol">
                    </div>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>KM Inicial</label>
                        <input id="kmAtual" type="number" class="modern-input" placeholder="Ex: 10000">
                    </div>
                    <div class="input-group">
                        <label>Modelo / Ano</label>
                        <input id="modelo" class="modern-input" placeholder="Ex: VW Gol 2023">
                    </div>
                </div>

                <button class="btn-primary mt-20" onclick="salvarVeiculo()">
                    <i class="fas fa-save"></i> Salvar Veículo
                </button>
            </div>

            <div class="card table-card mt-20">
                <div class="card-header"><i class="fas fa-list"></i> Viaturas Cadastradas</div>
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Placa</th>
                                <th>Identificação</th>
                                <th>KM Atual</th>
                                <th>Próxima Troca</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaVeiculos">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/vehicles.js"></script>
</body>
</html>
