<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Frota</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #e63946; --dark-card: #1a1a1a; --input-bg: #252525; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .btn-excluir { color: #888; cursor: pointer; padding: 10px; transition: 0.3s; }
        .btn-excluir:hover { color: var(--red); }
        .modern-input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .modern-input:focus { border-color: var(--red) !important; outline: none; }
        .card { background: var(--dark-card); border-radius: 12px; border: 1px solid #333; padding: 15px; margin-bottom: 20px; }
        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        tr.selecionado { background: #2a1012 !important; border-left: 4px solid var(--red); }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #e63946; position: sticky; top: 0; z-index: 1000;">
        <a href="dashboard.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left" style="color: #e63946;"></i> VOLTAR
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">GESTÃO DE FROTA</div>
        <div style="width: 50px;"></div>
    </header>

    <main style="padding: 15px;">
        
        <div class="card">
            <label style="color: #e63946; font-size: 0.65rem; font-weight: bold; text-transform: uppercase;">Pesquisar na Frota</label>
            <input type="text" id="filtroFrota" class="modern-input" placeholder="Placa ou modelo..." style="margin-top: 5px;">
        </div>

        <div class="card" id="cardForm">
            <div id="formTitle" style="color: #e63946; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-car-side" id="iconTitle"></i> <span id="txtTitle">CADASTRAR NOVA VIATURA</span>
            </div>
            
            <input type="hidden" id="veiculoId">

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div>
                    <label style="font-size: 0.7rem; color: #888;">MODELO / NOME VTR</label>
                    <input type="text" id="nome" class="modern-input" placeholder="Ex: GOL VTR 01">
                </div>
                
                <div>
                    <label style="font-size: 0.7rem; color: #888;">PLACA</label>
                    <input type="text" id="placa" class="modern-input" placeholder="ABC-1234">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; color: #888;">ANO</label>
                        <input type="text" id="ano" class="modern-input" placeholder="2024">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; color: #888;">KM INICIAL</label>
                        <input type="number" id="kmAtual" class="modern-input" placeholder="0">
                    </div>
                </div>
                
                <button class="btn-primary" id="btnSalvarVeiculo" style="background: #e63946; color: white;">
                    <i class="fas fa-save"></i> <span id="btnTxt">SALVAR NO SISTEMA</span>
                </button>
                <button id="btnCancelar" style="display:none; background: #333; color: #ccc; border: none; padding: 10px; border-radius: 8px; margin-top: 5px; cursor: pointer;">Cancelar Edição</button>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; background: #1a1a1a; color: white; font-size: 0.85rem;">
                <thead>
                    <tr style="background: #222; border-bottom: 2px solid #e63946;">
                        <th style="padding: 12px; text-align: left;">Modelo</th>
                        <th style="padding: 12px; text-align: left;">Placa</th>
                        <th style="padding: 12px; text-align: left;">KM</th>
                        <th style="padding: 12px; text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaVeiculos"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) { listarVeiculos(); } else { window.location.href = "login.html"; }
        });

        // FUNÇÃO PARA PREPARAR EDIÇÃO
        window.prepararEdicao = (id, nome, placa, ano, km) => {
            document.getElementById('veiculoId').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('placa').value = placa;
            document.getElementById('ano').value = ano || "";
            document.getElementById('kmAtual').value = km || 0;

            // Interface em modo edição
            document.getElementById('txtTitle').innerText = "EDITAR VEÍCULO";
            document.getElementById('btnTxt').innerText = "ATUALIZAR CADASTRO";
            document.getElementById('btnSalvarVeiculo').style.background = "#2ebd59";
            document.getElementById('btnCancelar').style.display = "block";
            document.getElementById('cardForm').scrollIntoView({ behavior: 'smooth' });
        };

        document.getElementById('btnCancelar').onclick = () => {
            location.reload(); // Forma mais rápida de limpar o estado
        };

        document.getElementById('btnSalvarVeiculo').onclick = async () => {
            const btn = document.getElementById('btnSalvarVeiculo');
            const id = document.getElementById('veiculoId').value;
            const nome = document.getElementById('nome').value.toUpperCase();
            const placa = document.getElementById('placa').value.toUpperCase();

            if(!nome || !placa) return alert("Preencha Nome e Placa!");

            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            const dados = {
                nome: nome,
                placa: placa,
                ano: document.getElementById('ano').value,
                km: document.getElementById('kmAtual').value,
                usuario: auth.currentUser.email
            };

            try {
                if (id) {
                    await updateDoc(doc(db, "veiculos", id), dados);
                    alert("Veículo atualizado!");
                } else {
                    await addDoc(collection(db, "veiculos"), dados);
                    alert("Veículo cadastrado!");
                }
                location.reload();
            } catch (e) {
                alert("Erro: " + e);
                btn.disabled = false;
            }
        };

        async function listarVeiculos() {
            try {
                const q = query(collection(db, "veiculos"), where("usuario", "==", auth.currentUser.email));
                const snap = await getDocs(q);
                const corpo = document.getElementById('tabelaVeiculos');
                corpo.innerHTML = "";

                snap.forEach(documento => {
                    const v = documento.data();
                    const id = documento.id;
                    // Linha agora tem um onclick para editar
                    corpo.innerHTML += `
                        <tr style="border-bottom: 1px solid #333;" onclick="prepararEdicao('${id}', '${v.nome}', '${v.placa}', '${v.ano}', '${v.km}')">
                            <td style="padding: 12px;">${v.nome}</td>
                            <td style="padding: 12px;"><b style="color: #e63946;">${v.placa}</b></td>
                            <td style="padding: 12px;">${v.km}</td>
                            <td style="padding: 12px; text-align: right;">
                                <i class="fas fa-trash-alt btn-excluir" onclick="event.stopPropagation(); excluirVeiculo('${id}')"></i>
                            </td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        window.excluirVeiculo = async (id) => {
            if (confirm("Deseja remover este veículo?")) {
                await deleteDoc(doc(db, "veiculos", id));
                location.reload();
            }
        };

        document.getElementById('filtroFrota').onkeyup = function() {
            const filter = this.value.toUpperCase();
            const tr = document.querySelectorAll("#tabelaVeiculos tr");
            tr.forEach(row => {
                row.style.display = row.innerText.toUpperCase().includes(filter) ? "" : "none";
            });
        };
    </script>
</body>
</html>
