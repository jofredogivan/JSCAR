<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Frota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="main-content">
        <header class="top-bar">
            <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Início</a>
            <h1>Frota de Veículos</h1>
        </header>

        <div class="card">
            <div class="input-group"><label>Placa</label><input id="placa" class="modern-input"></div>
            <div class="input-group"><label>Nome/Modelo</label><input id="nome" class="modern-input"></div>
            <button class="btn-primary" onclick="salvarVeiculo()"><i class="fas fa-plus"></i> Adicionar Veículo</button>
        </div>
        
        <div class="table-responsive">
            <table class="modern-table">
                <thead><tr><th>Veículo</th><th>Status</th><th>Ação</th></tr></thead>
                <tbody id="listaFrota"></tbody>
            </table>
        </div>
    </main>
    <script src="js/db.js"></script>
    <script src="js/vehicles.js"></script>
</body>
</html>
