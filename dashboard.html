<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Movimentação</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1>Painel de Controle</h1>
        </header>

        <section class="content-body">
            <div id="areaAlertas"></div>

            <div class="dashboard-grid">
                <div class="card dash-card">
                    <i class="fas fa-car-side" style="color: #e63946;"></i>
                    <div class="info">
                        <h3>Em Rota</h3>
                        <p id="countRota">0</p>
                    </div>
                </div>
                <div class="card dash-card">
                    <i class="fas fa-check-double" style="color: #27ae60;"></i>
                    <div class="info">
                        <h3>Vistorias (Hoje)</h3>
                        <p id="countVistorias">0</p>
                    </div>
                </div>
            </div>

            <div class="row mt-20">
                <div class="card chart-container" style="flex: 1; min-width: 300px;">
                    <div class="card-header">Status da Frota</div>
                    <canvas id="graficoStatus"></canvas>
                </div>

                <div class="card" style="flex: 1; min-width: 300px;">
                    <div class="card-header">Manutenções do Mês</div>
                    <div class="maintenance-summary">
                        <h2 id="countManutencao" style="font-size: 3rem; text-align: center; margin: 20px 0;">0</h2>
                        <p style="text-align: center; color: #888;">Serviços realizados no período atual</p>
                    </div>
                </div>
            </div>

            <div class="card mt-20">
                <div class="card-header">Últimas Movimentações</div>
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Veículo</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaResumo"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
