<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --red: #e63946; --card: #1e1e1e; }
        
        /* Layout Mobile-First */
        .main-content { padding: 15px; background: #121212; min-height: 100vh; }

        /* Grid de Números Rápido no Topo */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 3px solid var(--red);
        }

        .stat-item span { font-size: 0.7rem; color: #888; display: block; text-transform: uppercase; }
        .stat-item strong { font-size: 1.5rem; color: #fff; }

        /* Container dos Gráficos */
        .chart-box {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .card-title {
            color: var(--red);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Altura controlada para os gráficos não sumirem no mobile */
        .chart-container {
            position: relative;
            height: 200px; 
            width: 100%;
        }

        #areaAlertas {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> MENU
        </a>
        <div style="color: var(--red); font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">DASHBOARD</div>
        <div style="width: 50px;"></div> </header>

    <main class="main-content">
        
        <div class="stats-grid">
            <div class="stat-item">
                <span>Frota Total</span>
                <strong id="countFrotaTotal">0</strong>
            </div>
            <div class="stat-item">
                <span>Vistorias Hoje</span>
                <strong id="countVistorias">0</strong>
            </div>
        </div>

        <div id="areaAlertas"></div>

        <div class="chart-box">
            <div class="card-title"><i class="fas fa-chart-pie"></i> Status Operacional (Rota vs Base)</div>
            <div class="chart-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <div class="card-title"><i class="fas fa-chart-line"></i> Atividade Semanal</div>
            <div class="chart-container">
                <canvas id="graficoLinha"></canvas>
            </div>
        </div>

    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
