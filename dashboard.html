<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Dashboard</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Movimentação</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Menu Principal</a>
        
        <header class="top-bar">
            <h1>Painel de Controle</h1>
        </header>

        <section class="content-body">
            <div id="areaAlertas" class="alert-container">
                </div>

            <div class="dashboard-grid">
                <div class="card dash-card">
                    <i class="fas fa-car-side"></i>
                    <h3>Veículos em Rota</h3>
                    <p id="countRota">0</p>
                </div>
                <div class="card dash-card">
                    <i class="fas fa-check-circle"></i>
                    <h3>Vistorias (Hoje)</h3>
                    <p id="countVistorias">0</p>
                </div>
                <div class="card dash-card">
                    <i class="fas fa-wrench"></i>
                    <h3>Manutenções (Mês)</h3>
                    <p id="countManutencao">0</p>
                </div>
            </div>

            <div class="card mt-20">
                <div class="card-header">Últimas Atividades</div>
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Data/Hora</th>
                                <th>Veículo</th>
                                <th>Evento</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaResumo">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
