<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --red-japan: #e63946; --bg-card: #1e1e1e; }

        body { background-color: #121212; color: white; margin: 0; font-family: sans-serif; }

        /* Grid de Indicadores rápidos */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-bottom: 4px solid var(--red-japan);
        }

        .stat-card span { font-size: 0.7rem; color: #888; text-transform: uppercase; display: block; }
        .stat-card strong { font-size: 1.8rem; display: block; margin-top: 5px; }

        /* Container dos Gráficos */
        .chart-section {
            padding: 0 15px 20px;
        }

        .chart-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .chart-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--red-japan);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Mantém a proporção no mobile */
        .canvas-container {
            position: relative;
            height: 220px;
            width: 100%;
        }

        /* Área de Alertas (Troca de Óleo) */
        #areaAlertas {
            padding: 0 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> VOLTAR
        </a>
        <div style="color: var(--red-japan); font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">DASHBOARD OPERACIONAL</div>
        <div style="width: 50px;"></div>
    </header>

    <section class="stats-container">
        <div class="stat-card">
            <span>Frota Total</span>
            <strong id="countFrotaTotal">0</strong>
        </div>
        <div class="stat-card">
            <span>Vistorias Hoje</span>
            <strong id="countVistorias">0</strong>
        </div>
    </section>

    <div id="areaAlertas"></div>

    <section class="chart-section">
        
        <div class="chart-card">
            <div class="chart-title"><i class="fas fa-chart-pie"></i> STATUS DA FROTA</div>
            <div class="canvas-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title"><i class="fas fa-chart-line"></i> MOVIMENTAÇÃO SEMANAL</div>
            <div class="canvas-container">
                <canvas id="graficoLinha"></canvas>
            </div>
        </div>

    </section>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
