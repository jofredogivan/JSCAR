<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Estilo do indicador Sistema Ativo */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #fff;
            font-weight: bold;
        }
        .dot {
            height: 10px;
            width: 10px;
            background-color: #27ae60;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(39, 174, 96, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); }
        }
    </style>
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon" style="color: #e63946;"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Entrada/Saída</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Painel de Controle Operacional</h1>
            <div class="status-badge">
                <span class="dot"></span> SISTEMA ATIVO
            </div>
        </header>

        <section class="content-body">
            <div class="dashboard-grid">
                <div class="card dash-card">
                    <i class="fas fa-car" style="color: #e63946; font-size: 2rem;"></i>
                    <div class="info">
                        <h3>FROTA</h3>
                        <p id="countFrotaTotal">0</p>
                    </div>
                </div>
                <div class="card dash-card" style="border-bottom: 3px solid #f1c40f;">
                    <i class="fas fa-tools" style="color: #f1c40f; font-size: 2rem;"></i>
                    <div class="info">
                        <h3>NA OFICINA</h3>
                        <p id="countOficina">0</p>
                    </div>
                </div>
                <div class="card dash-card" style="border-bottom: 3px solid #27ae60;">
                    <i class="fas fa-clipboard-list" style="color: #27ae60; font-size: 2rem;"></i>
                    <div class="info">
                        <h3>VISTORIAS</h3>
                        <p id="countVistorias">0</p>
                    </div>
                </div>
            </div>

            <div class="row mt-20" style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="card" style="flex: 2; min-width: 300px;">
                    <div class="card-header" style="color: #e63946;"><i class="fas fa-chart-area"></i> Movimentação Semanal</div>
                    <canvas id="graficoLinha" style="max-height: 250px;"></canvas>
                </div>
                <div class="card" style="flex: 1; min-width: 250px;">
                    <div class="card-header" style="color: #e63946;"><i class="fas fa-chart-pie"></i> Status da Frota</div>
                    <canvas id="graficoPizza" style="max-height: 250px;"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
