<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --red: #e63946; --dark: #121212; --card: #1e1e1e; }
        
        body { background: var(--dark); color: white; margin: 0; font-family: sans-serif; }

        /* Barra de Navegação Superior Fixa */
        .nav-header {
            background: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-header .btn-back {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-header .logo-dash {
            font-weight: bold;
            color: var(--red);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Container dos Gráficos */
        .main-content { padding: 15px; }
        
        .chart-box {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .chart-container {
            position: relative;
            height: 180px; /* Altura controlada para mobile */
            width: 100%;
        }

        .card-title {
            color: var(--red);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Grid de Números Rápido */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: var(--card);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 3px solid #333;
        }

        .stat-item span { font-size: 0.7rem; color: #888; display: block; }
        .stat-item strong { font-size: 1.2rem; color: white; }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="btn-back">
            <i class="fas fa-chevron-left"></i>
            <span>Menu</span>
        </a>
        <div class="logo-dash">JAPAN SECURITY</div>
        <div style="width: 30px;"></div> </header>

    <main class="main-content">
        
        <div class="stats-grid">
            <div class="stat-item" style="border-color: var(--red);">
                <span>FROTA</span>
                <strong id="countFrotaTotal">0</strong>
            </div>
            <div class="stat-item" style="border-color: #f1c40f;">
                <span>ROTA</span>
                <strong id="totalRota">0</strong>
            </div>
            <div class="stat-item" style="border-color: #27ae60;">
                <span>VISTO.</span>
                <strong id="countVistorias">0</strong>
            </div>
        </div>

        <div class="chart-box">
            <div class="card-title"><i class="fas fa-chart-line"></i> Movimentação Semanal</div>
            <div class="chart-container">
                <canvas id="graficoLinha"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <div class="card-title"><i class="fas fa-chart-pie"></i> Status da Frota</div>
            <div class="chart-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>

        <div id="areaAlertas"></div>

    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
