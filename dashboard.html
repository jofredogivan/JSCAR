<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Dashboard (Frota)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS Adicional para o Indicador Piscando e Ajustes Visual */
        #sistema-status {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            z-index: 1000;
        }
        #sistema-status i {
            font-size: 1.2rem;
            color: #27ae60;
            text-shadow: 0 0 10px #27ae60;
            animation: pisca 1.5s infinite;
        }
        #sistema-status span {
            color: #fff;
            font-weight: bold;
            font-size: 0.9rem;
        }
        @keyframes pisca {
            0% { opacity: 0.1; }
            50% { opacity: 1; }
            100% { opacity: 0.1; }
        }
        /* Ajuste para o Chart */
        .chart-wrapper {
            max-width: 400px;
            margin: 20px auto;
        }
        /* Oculta os alertas se não houver nenhum */
        #areaAlertas:empty {
            display: none;
        }
    </style>
</head>
<body class="has-sidebar">

    <div id="sistema-status">
        <i class="fas fa-signal"></i>
        <span>SISTEMA ATIVO</span>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="entrada_saida.html"><i class="fas fa-exchange-alt"></i> Movimentação</a></li>
                <li><a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> Manutenção</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="backup.html"><i class="fas fa-database"></i> Backup</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1>Controle de Frota - Dashboard</h1>
        </header>

        <section class="content-body">
            <div id="areaAlertas"></div>

            <div class="card chart-card">
                <div class="card-header">Status da Frota em Tempo Real</div>
                <div class="chart-wrapper">
                    <canvas id="graficoStatus"></canvas>
                </div>
            </div>

            <div class="card table-card mt-20">
                <div class="card-header">Últimas Movimentações Registradas</div>
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Horário</th>
                                <th>Veículo</th>
                                <th>Status Atual</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaResumo"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
