<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red-japan: #e63946; --bg-card: #1e1e1e; --green: #2ecc71; }
        body { background-color: #121212; color: white; margin: 0; font-family: sans-serif; padding-bottom: 30px; }
        
        /* --- STATUS PISCANDO --- */
        .status-bar {
            background: #000;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .blink-green {
            color: var(--green);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 3px;
            animation: pulse-green 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        @keyframes pulse-green {
            0% { opacity: 1; text-shadow: 0 0 5px var(--green); }
            50% { opacity: 0.2; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 5px var(--green); }
        }

        /* --- BOTÕES DE NAVEGAÇÃO --- */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 8px;
            padding: 15px;
        }
        .nav-card {
            background: var(--bg-card);
            border: 1px solid #333;
            padding: 12px 5px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }
        .nav-card:active { transform: scale(0.95); background: #222; }
        .nav-card i { color: var(--red-japan); font-size: 1.3rem; margin-bottom: 6px; display: block; }
        .nav-card span { font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px 15px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--red-japan); }
        .stat-card span { font-size: 0.7rem; color: #888; text-transform: uppercase; display: block; }
        .stat-card strong { font-size: 1.8rem; display: block; margin-top: 5px; }
        
        .chart-section { padding: 0 15px 20px; }
        .chart-card { background: var(--bg-card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .chart-title { font-size: 0.9rem; font-weight: bold; color: var(--red-japan); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .canvas-container { position: relative; height: 220px; width: 100%; }
    </style>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <div style="color: white; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-user-shield"></i> JOFRE
        </div>
        <div style="color: var(--red-japan); font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">JAPAN SECURITY</div>
        <a href="index.html" style="color: #666; text-decoration: none;"><i class="fas fa-sign-out-alt"></i></a>
    </header>

    <div class="status-bar">
        <div class="blink-green">
            <i class="fas fa-microchip"></i> SISTEMA ATIVO
        </div>
    </div>

    <nav class="nav-grid">
        <a href="vistoria.html" class="nav-card">
            <i class="fas fa-clipboard-check"></i>
            <span>Vistoria</span>
        </a>
        <a href="veiculos.html" class="nav-card">
            <i class="fas fa-car-side"></i>
            <span>Frota</span>
        </a>
        <a href="entrada_saida.html" class="nav-card">
            <i class="fas fa-exchange-alt"></i>
            <span>Entr/Saída</span>
        </a>
        <a href="manutencao.html" class="nav-card">
            <i class="fas fa-wrench"></i>
            <span>Manut.</span>
        </a>
        <a href="backup.html" class="nav-card">
            <i class="fas fa-database"></i>
            <span>Backup</span>
        </a>
    </nav>

    <section class="stats-container">
        <div class="stat-card">
            <span>Frota Total</span>
            <strong id="countFrotaTotal">0</strong>
        </div>
        <div class="stat-card">
            <span>Vistorias Hoje</span>
            <strong id="countVistorias">0</strong>
        </div>
    </section>

    <section class="chart-section">
        <div class="chart-card">
            <div class="chart-title"><i class="fas fa-chart-pie"></i> STATUS OPERACIONAL</div>
            <div class="canvas-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title"><i class="fas fa-chart-bar"></i> QUILOMETRAGEM POR VEÍCULO</div>
            <div class="canvas-container">
                <canvas id="graficoLinha"></canvas>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                carregarDados(user.email);
            } else {
                window.location.href = "login.html";
            }
        });

        async function carregarDados(email) {
            const snapFrota = await getDocs(collection(db, "veiculos"));
            let totalVeiculos = 0;
            const labelsPlacas = [];
            const dadosKM = [];

            snapFrota.forEach(doc => {
                const data = doc.data();
                if(data.usuario === email) {
                    totalVeiculos++;
                    labelsPlacas.push(data.placa);
                    dadosKM.push(data.kmAtual || 0);
                }
            });
            document.getElementById('countFrotaTotal').innerText = totalVeiculos;

            const snapVistorias = await getDocs(collection(db, "vistorias"));
            const hoje = new Date().toLocaleDateString('pt-BR');
            let vistoriasHoje = 0;
            
            snapVistorias.forEach(doc => {
                const data = doc.data();
                if(data.usuario === email && data.dataExibicao && data.dataExibicao.includes(hoje)) {
                    vistoriasHoje++;
                }
            });
            document.getElementById('countVistorias').innerText = vistoriasHoje;

            iniciarGraficos(labelsPlacas, dadosKM);
        }

        function iniciarGraficos(placas, kms) {
            new Chart(document.getElementById('graficoPizza'), {
                type: 'doughnut',
                data: {
                    labels: ['Em Operação', 'Manutenção'],
                    datasets: [{
                        data: [placas.length, 0], 
                        backgroundColor: ['#2ecc71', '#e63946'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('graficoLinha'), {
                type: 'bar',
                data: {
                    labels: placas,
                    datasets: [{
                        label: 'KM Atual',
                        data: kms,
                        backgroundColor: '#e63946',
                        borderRadius: 5
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#333' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
