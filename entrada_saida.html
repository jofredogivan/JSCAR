<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Movimentação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="main-content">
        <header class="top-bar">
            <a href="index.html" class="btn-voltar">
                <i class="fas fa-arrow-left"></i> INÍCIO
            </a>
            <h1>MOVIMENTAÇÃO</h1>
        </header>

        <section class="content-body">
            <div class="card">
                <div class="row">
                    <div class="input-group">
                        <label>Viatura (Placa)</label>
                        <input list="listaVeiculos" id="veiculo" class="modern-input" placeholder="Selecione a placa...">
                        <datalist id="listaVeiculos"></datalist>
                    </div>
                    <div class="input-group">
                        <label>KM Atual</label>
                        <input type="number" id="km" class="modern-input" placeholder="00000">
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-primary" style="background: #27ae60;" onclick="registrar('ENTRADA')">
                        <i class="fas fa-sign-in-alt"></i> ENTRADA
                    </button>
                    <button class="btn-primary" onclick="registrar('SAÍDA')">
                        <i class="fas fa-sign-out-alt"></i> SAÍDA
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="modern-table">
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Placa</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaMovimentacao"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/entrada_saida.js"></script>
</body>
</html>
