<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Movimentação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="main-content">
        <header class="top-bar">
            <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Início</a>
            <h1>Movimentação</h1>
        </header>

        <div class="card">
            <div class="row">
                <div class="input-group">
                    <label>Filtrar por Placa ou Viatura</label>
                    <input type="text" id="filtroPlaca" class="modern-input" placeholder="Digite para buscar..." onkeyup="filtrarTabela()">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <div class="input-group">
                    <label>Viatura (Placa)</label>
                    <input list="listaVeiculos" id="veiculoInput" class="modern-input" placeholder="Selecione...">
                    <datalist id="listaVeiculos"></datalist>
                </div>
                <div class="input-group">
                    <label>KM Atual</label>
                    <input type="number" id="kmInput" class="modern-input" placeholder="00000">
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-primary" style="background: #27ae60;" onclick="registrarMovimentacao('ENTRADA')">ENTRADA</button>
                <button class="btn-primary" onclick="registrarMovimentacao('SAÍDA')">SAÍDA</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Viatura</th>
                        <th>KM</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </main>
    <script src="js/db.js"></script>
    <script src="js/entrada_saida.js"></script>
</body>
</html>
