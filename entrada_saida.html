<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Movimentação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">MOVIMENTAÇÃO</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <div class="card" style="margin-bottom: 15px; border: 1px solid #e63946; background: #1a1a1a;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label style="color: #e63946; font-size: 0.7rem; font-weight: bold;">FILTRAR E EXPORTAR</label>
                <input list="listaVeiculos" id="f_placa" class="modern-input" placeholder="Todas as Viaturas">
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="f_data_ini" class="modern-input">
                    <input type="date" id="f_data_fim" class="modern-input">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-primary" id="btnFiltrar" style="background: #333;">
                        <i class="fas fa-search"></i> FILTRAR
                    </button>
                    <button class="btn-primary" id="btnPDF" style="background: #34495e;">
                        <i class="fas fa-file-pdf"></i> GERAR PDF
                    </button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div class="input-group">
                    <label>Viatura</label>
                    <input list="listaVeiculos" id="es_veiculo" class="modern-input" placeholder="Selecione a placa...">
                    <datalist id="listaVeiculos"></datalist>
                </div>

                <div class="input-group">
                    <label>Tipo de Registro</label>
                    <select id="es_tipo" class="modern-input">
                        <option value="SAIDA">SAÍDA (INÍCIO DE PLANTÃO)</option>
                        <option value="ENTRADA">ENTRADA (FIM DE PLANTÃO)</option>
                    </select>
                </div>

                <div class="input-group" style="background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #333;">
                    <label style="font-size: 0.65rem; color: #e63946; font-weight: bold;">DATA/HORA DO EVENTO</label>
                    <input type="datetime-local" id="es_data_retroativa" class="modern-input">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>KM</label>
                        <input type="number" id="es_km" class="modern-input">
                    </div>
                    <div style="flex: 1;">
                        <label>Vigilante</label>
                        <input type="text" id="es_vigilante" class="modern-input">
                    </div>
                </div>

                <button class="btn-primary" id="btnSalvarES" style="background: #e63946; padding: 15px;">
                    <i class="fas fa-save"></i> REGISTRAR MOVIMENTAÇÃO
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>VTR</th>
                        <th>Tipo</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaES"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let dadosFiltrados = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarVeiculos();
                buscarDados();
            } else {
                window.location.href = "login.html";
            }
        });

        // --- FUNÇÃO PARA DELETAR REGISTRO ---
        window.deletarRegistro = async (id) => {
            if (confirm("Deseja realmente excluir este lançamento?")) {
                try {
                    await deleteDoc(doc(db, "movimentacoes", id));
                    alert("Registro excluído!");
                    buscarDados(); // Atualiza a lista sem recarregar a página toda
                } catch (error) {
                    alert("Erro ao excluir registro.");
                }
            }
        };

        // --- BUSCA E FILTROS ---
        async function buscarDados() {
            const placa = document.getElementById('f_placa').value.toUpperCase();
            const dIni = document.getElementById('f_data_ini').value;
            const dFim = document.getElementById('f_data_fim').value;

            const q = query(collection(db, "movimentacoes"), where("usuario", "==", auth.currentUser.email), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            
            const corpo = document.getElementById('tabelaES');
            corpo.innerHTML = "";
            dadosFiltrados = [];

            snap.forEach(documento => {
                const item = documento.data();
                const id = documento.id; // Pegando o ID do Firebase
                const dataItem = item.dataISO ? item.dataISO.split('T')[0] : "";
                
                const batePlaca = placa === "" || item.veiculo.includes(placa);
                const bateData = (!dIni || dataItem >= dIni) && (!dFim || dataItem <= dFim);

                if (batePlaca && bateData) {
                    dadosFiltrados.push(item);
                    const corTipo = item.tipo === "SAIDA" ? "#e63946" : "#2ecc71";
                    corpo.innerHTML += `<tr>
                        <td style="font-size:0.65rem">${item.dataExibicao}</td>
                        <td><b>${item.veiculo}</b></td>
                        <td style="color:${corTipo}; font-weight:bold; font-size:0.7rem">${item.tipo}</td>
                        <td>
                            <button onclick="deletarRegistro('${id}')" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:1rem;">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>`;
                }
            });
        }

        document.getElementById('btnFiltrar').onclick = buscarDados;

        // --- SALVAR REGISTRO ---
        document.getElementById('btnSalvarES').onclick = async () => {
            const btn = document.getElementById('btnSalvarES');
            const dataRetro = document.getElementById('es_data_retroativa').value;
            const dataObj = dataRetro ? new Date(dataRetro) : new Date();

            if(!document.getElementById('es_veiculo').value) {
                alert("Selecione uma viatura!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "REGISTRANDO...";

            const dados = {
                veiculo: document.getElementById('es_veiculo').value.toUpperCase(),
                tipo: document.getElementById('es_tipo').value,
                km: document.getElementById('es_km').value || 0,
                vigilante: document.getElementById('es_vigilante').value.toUpperCase(),
                dataExibicao: dataObj.toLocaleString('pt-BR'),
                dataISO: dataObj.toISOString(),
                timestamp: dataObj.getTime(),
                usuario: auth.currentUser.email
            };

            await addDoc(collection(db, "movimentacoes"), dados);
            alert("Registrado com sucesso!");
            location.reload();
        };

        // --- GERAR PDF ---
        document.getElementById('btnPDF').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(26, 26, 26);
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(230, 57, 70);
            doc.setFontSize(20);
            doc.text("JAPAN SECURITY", 14, 18);
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text("RELATÓRIO OPERACIONAL DE MOVIMENTAÇÃO DE FROTA", 14, 28);

            const colunas = ["Data/Hora", "VTR", "Evento", "KM", "Vigilante"];
            const linhas = dadosFiltrados.map(i => [i.dataExibicao, i.veiculo, i.tipo, i.km, i.vigilante]);

            doc.autoTable({
                head: [colunas],
                body: linhas,
                startY: 40,
                headStyles: { fillColor: [230, 57, 70] },
                theme: 'grid',
                styles: { fontSize: 8 }
            });

            doc.save(`movimentacao_${new Date().getTime()}.pdf`);
        };

        async function carregarVeiculos() {
            const q = query(collection(db, "veiculos"), where("usuario", "==", auth.currentUser.email));
            const snap = await getDocs(q);
            const list = document.getElementById('listaVeiculos');
            snap.forEach(doc => { list.innerHTML += `<option value="${doc.data().placa}">`; });
        }
    </script>
</body>
</html>
