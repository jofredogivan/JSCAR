<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Movimentação</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #e63946; --dark: #121212; --card: #1e1e1e; --border: #333; --green: #27ae60; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #000; height: 100vh; border-right: 1px solid var(--border); position: fixed; }
        .sidebar-nav a { display: block; padding: 15px 20px; color: #888; text-decoration: none; border-left: 4px solid transparent; transition: 0.3s; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color: white; background: rgba(230,57,70,0.1); border-left-color: var(--red); }
        .sidebar-nav i { margin-right: 10px; width: 20px; text-align: center; }

        .main { flex: 1; margin-left: 250px; padding: 30px; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* Form e Inputs */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        label { display: block; color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
        .modern-input { width: 100%; background: #2a2a2a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 4px; box-sizing: border-box; outline: none; }
        .modern-input:focus { border-color: var(--red); }
        
        /* Botões */
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-save { background: var(--red); width: 100%; margin-top: 15px; }
        .btn-pdf { background: var(--green); }

        /* Filtros */
        .filter-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; align-items: flex-end; margin-bottom: 20px; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #888; padding: 12px; border-bottom: 2px solid var(--border); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-saida { background: rgba(230,57,70,0.2); color: var(--red); }
        .badge-entrada { background: rgba(39, 174, 96, 0.2); color: var(--green); }
        .btn-delete { background: none; border: none; color: #555; cursor: pointer; }
        .btn-delete:hover { color: var(--red); }

        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 15px; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="padding: 30px 20px; text-align: center;"><h2 style="color:var(--red); margin:0;">JAPAN</h2><span style="font-size:10px; color:#888;">SECURITY</span></div>
        <nav class="sidebar-nav">
            <a href="entrada_saida.html" class="active"><i class="fas fa-exchange-alt"></i> Movimentação</a>
            <a href="vistoria.html"><i class="fas fa-clipboard-check"></i> Vistoria</a>
            <a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a>
        </nav>
    </aside>

    <main class="main">
        <div class="card">
            <h4 style="margin-top:0; color:var(--red);">Novo Registro de Movimentação</h4>
            <div class="grid-inputs">
                <div><label>Viatura</label><input id="veiculo" class="modern-input" list="listaVeiculos" placeholder="PBP..."><datalist id="listaVeiculos"></datalist></div>
                <div><label>Tipo</label><select id="tipo" class="modern-input"><option value="SAÍDA">SAÍDA</option><option value="ENTRADA">ENTRADA</option></select></div>
                <div><label>KM</label><input id="km" type="number" class="modern-input"></div>
                <div><label>Motorista</label><input id="responsavel" class="modern-input"></div>
            </div>
            <div style="margin-top:15px;"><label>Observação</label><input id="obs" class="modern-input" placeholder="Opcional"></div>
            <button class="btn btn-save" onclick="salvarMovimento()"><i class="fas fa-check"></i> SALVAR REGISTRO</button>
        </div>

        <div class="card">
            <h4 style="margin-top:0; color: #888;">Filtros de Exportação</h4>
            <div class="filter-bar">
                <div><label>Data Início</label><input id="f_data_ini" type="date" class="modern-input"></div>
                <div><label>Hora Início</label><input id="f_hora_ini" type="time" class="modern-input" value="00:00"></div>
                <div><label>Data Fim</label><input id="f_data_fim" type="date" class="modern-input"></div>
                <div><label>Hora Fim</label><input id="f_hora_fim" type="time" class="modern-input" value="23:59"></div>
                <button class="btn btn-pdf" onclick="gerarRelatorioPDF()"><i class="fas fa-file-pdf"></i> GERAR PDF</button>
            </div>

            <table>
                <thead><tr><th>Data/Hora</th><th>Viatura</th><th>Tipo</th><th>KM</th><th>Motorista</th><th style="text-align:right">Ação</th></tr></thead>
                <tbody id="tabelaMovimentacao"></tbody>
            </table>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/entrada_saida.js"></script>
</body>
</html>
