<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Movimentação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <header style="background: #1a1a1a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-chevron-left"></i> INÍCIO
        </a>
        <div style="color: #e63946; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">MOVIMENTAÇÃO</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="main-content" style="padding: 15px;">
        
        <div class="card" style="margin-bottom: 15px; border: 1px solid #e63946; background: #1a1a1a;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label style="color: #e63946; font-size: 0.7rem; font-weight: bold;">FILTRAR POR PERÍODO COMPLETO E VTR</label>
                <input list="listaVeiculos" id="f_placa" class="modern-input" placeholder="Todas as Viaturas">
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label style="font-size: 0.6rem; color: #777;">INÍCIO (DATA E HORA)</label>
                        <input type="datetime-local" id="f_data_ini" class="modern-input">
                    </div>
                    <div style="flex:1">
                        <label style="font-size: 0.6rem; color: #777;">FIM (DATA E HORA)</label>
                        <input type="datetime-local" id="f_data_fim" class="modern-input">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-primary" id="btnFiltrar" style="background: #333;">
                        <i class="fas fa-search"></i> FILTRAR
                    </button>
                    <button class="btn-primary" id="btnPDF" style="background: #34495e;">
                        <i class="fas fa-file-pdf"></i> GERAR PDF
                    </button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div class="input-group">
                    <label>Viatura</label>
                    <input list="listaVeiculos" id="es_veiculo" class="modern-input" placeholder="Selecione a placa...">
                    <datalist id="listaVeiculos"></datalist>
                </div>

                <div class="input-group">
                    <label>Tipo de Registro</label>
                    <select id="es_tipo" class="modern-input">
                        <option value="SAIDA">SAÍDA (INÍCIO DE PLANTÃO)</option>
                        <option value="ENTRADA">ENTRADA (FIM DE PLANTÃO)</option>
                    </select>
                </div>

                <div class="input-group" style="background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #333;">
                    <label style="font-size: 0.65rem; color: #e63946; font-weight: bold;">DATA E HORA DO EVENTO</label>
                    <input type="datetime-local" id="es_data_retroativa" class="modern-input">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>KM</label>
                        <input type="number" id="es_km" class="modern-input" placeholder="0">
                    </div>
                    <div style="flex: 1;">
                        <label>Vigilante</label>
                        <input type="text" id="es_vigilante" class="modern-input" placeholder="NOME">
                    </div>
                </div>

                <button class="btn-primary" id="btnSalvarES" style="background: #e63946; padding: 15px;">
                    <i class="fas fa-save"></i> REGISTRAR MOVIMENTAÇÃO
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>VTR</th>
                        <th>Tipo</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaES"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
            authDomain: "japan-security-car-1a7d8.firebaseapp.com",
            projectId: "japan-security-car-1a7d8",
            storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
            messagingSenderId: "616009365036",
            appId: "1:616009365036:web:f644dd6106818566900389"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let dadosFiltrados = [];
        let veiculosCache = {}; 

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarVeiculos();
                buscarDados();
            } else {
                window.location.href = "login.html";
            }
        });

        // KM AUTOMÁTICO
        document.getElementById('es_veiculo').addEventListener('input', (e) => {
            const vtr = e.target.value.toUpperCase().trim();
            if(veiculosCache[vtr]) {
                document.getElementById('es_km').value = veiculosCache[vtr].km;
            }
        });

        async function buscarDados() {
            const placaFiltro = document.getElementById('f_placa').value.toUpperCase().trim();
            const f_ini = document.getElementById('f_data_ini').value;
            const f_fim = document.getElementById('f_data_fim').value;

            // Converte filtros para timestamp para comparação precisa
            const tsIni = f_ini ? new Date(f_ini).getTime() : 0;
            const tsFim = f_fim ? new Date(f_fim).getTime() : Infinity;

            const q = query(collection(db, "movimentacoes"), where("usuario", "==", auth.currentUser.email));
            
            try {
                const snap = await getDocs(q);
                const corpo = document.getElementById('tabelaES');
                corpo.innerHTML = "";
                dadosFiltrados = [];
                let lista = [];

                snap.forEach(d => {
                    let item = d.data();
                    item.id = d.id;
                    lista.push(item);
                });

                lista.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                lista.forEach(item => {
                    const itemTS = item.timestamp || 0;
                    const batePlaca = placaFiltro === "" || item.veiculo.includes(placaFiltro);
                    const bateDataHora = itemTS >= tsIni && itemTS <= tsFim;

                    if (batePlaca && bateDataHora) {
                        dadosFiltrados.push(item);
                        const corTipo = item.tipo === "SAIDA" ? "#e63946" : "#2ecc71";
                        const partesData = item.dataExibicao ? item.dataExibicao.split(' ') : ["--", "--"];

                        corpo.innerHTML += `<tr>
                            <td style="font-size:0.75rem; line-height: 1.2;">
                                <b style="color: #eee;">${partesData[0]}</b><br>
                                <span style="color: #e63946; font-weight: bold;">${partesData[1] || ''}</span>
                            </td>
                            <td><b>${item.veiculo}</b></td>
                            <td style="color:${corTipo}; font-weight:bold; font-size:0.7rem">${item.tipo}</td>
                            <td>
                                <button onclick="deletarRegistro('${item.id}')" style="background:none; border:none; color:#e63946; padding:10px;">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>`;
                    }
                });

                if(dadosFiltrados.length === 0) {
                    corpo.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#777; padding:20px;'>Nenhum registro encontrado</td></tr>";
                }
            } catch (e) { console.error("Erro busca:", e); }
        }

        document.getElementById('btnFiltrar').onclick = buscarDados;

        document.getElementById('btnSalvarES').onclick = async () => {
            const btn = document.getElementById('btnSalvarES');
            const vtr = document.getElementById('es_veiculo').value.toUpperCase().trim();
            const km = document.getElementById('es_km').value;
            const vig = document.getElementById('es_vigilante').value.toUpperCase().trim();

            if(!vtr || !km || !vig) return alert("Preencha Viatura, KM e Vigilante!");

            const dataInput = document.getElementById('es_data_retroativa').value;
            const agora = dataInput ? new Date(dataInput) : new Date();

            btn.disabled = true;
            btn.innerText = "REGISTRANDO...";

            try {
                await addDoc(collection(db, "movimentacoes"), {
                    veiculo: vtr,
                    tipo: document.getElementById('es_tipo').value,
                    km: Number(km),
                    vigilante: vig,
                    dataExibicao: agora.toLocaleString('pt-BR'),
                    dataISO: agora.toISOString(),
                    timestamp: agora.getTime(),
                    usuario: auth.currentUser.email
                });

                if(veiculosCache[vtr]) {
                    const vtrRef = doc(db, "veiculos", veiculosCache[vtr].id);
                    await updateDoc(vtrRef, { kmAtual: Number(km) });
                    veiculosCache[vtr].km = Number(km);
                }
                
                alert("Salvo com sucesso!");
                document.getElementById('es_km').value = "";
                buscarDados(); 
            } catch (e) { alert("Erro ao salvar."); }

            btn.disabled = false;
            btn.innerText = "REGISTRAR MOVIMENTAÇÃO";
        };

        document.getElementById('btnPDF').onclick = () => {
            if(dadosFiltrados.length === 0) return alert("Filtre os dados primeiro!");
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF('l', 'mm', 'a4'); 
            docPdf.text("JAPAN SECURITY - RELATÓRIO DE MOVIMENTAÇÃO", 14, 15);
            
            const colunas = ["Data e Hora", "VTR", "Evento", "KM", "Vigilante"];
            const linhas = dadosFiltrados.map(i => [i.dataExibicao, i.veiculo, i.tipo, i.km + " KM", i.vigilante]);

            docPdf.autoTable({
                head: [colunas],
                body: linhas,
                startY: 25,
                styles: { fontSize: 9 },
                headStyles: { fillColor: [26, 26, 26] }
            });
            docPdf.save(`relatorio_${new Date().getTime()}.pdf`);
        };

        async function carregarVeiculos() {
            const q = query(collection(db, "veiculos"), where("usuario", "==", auth.currentUser.email));
            const snap = await getDocs(q);
            const list = document.getElementById('listaVeiculos');
            list.innerHTML = "";
            veiculosCache = {};
            snap.forEach(d => {
                const info = d.data();
                veiculosCache[info.placa] = { km: info.kmAtual || 0, id: d.id };
                list.innerHTML += `<option value="${info.placa}">`;
            });
        }

        window.deletarRegistro = async (id) => {
            if (confirm("Excluir este lançamento?")) {
                try {
                    await deleteDoc(doc(db, "movimentacoes", id));
                    buscarDados();
                } catch (e) { alert("Erro ao excluir."); }
            }
        };
    </script>
</body>
</html>
