<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Security | Fleet Control</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #e63946; --green: #2ecc71; --dark: #121212; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 4px solid var(--red); }
        .container { padding: 15px; max-width: 750px; margin: auto; }
        .card { background: var(--dark); padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; position: relative; }
        label { font-size: 0.7rem; color: var(--red); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .modern-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        
        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 800; transition: 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-save { background: var(--green); color: #000; height: 55px; width: 100%; font-size: 1.1rem; box-shadow: 0 4px 0 #27ae60; }
        .btn-filter { background: #333; color: #fff; height: 42px; width: 100%; border: 1px solid #555; }
        .btn-pdf { background: var(--red); color: #fff; height: 42px; width: 100%; }

        #lista_vtr { 
            display: none; 
            position: absolute; 
            width: calc(100% - 36px); 
            background: #222; 
            border: 2px solid var(--red); 
            z-index: 9999; 
            max-height: 250px; 
            overflow-y: auto; 
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            top: 75px; 
        }
        #lista_vtr div { padding: 14px; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.95rem; color: #ccc; }
        #lista_vtr div:hover { background: var(--red); color: #fff; }

        table { width: 100%; border-collapse: collapse; background: #111; margin-top: 10px; font-size: 0.8rem; }
        th { background: #222; color: var(--red); padding: 10px; text-align: left; border-bottom: 2px solid var(--red); }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.4rem; font-weight: 900; color: var(--red);">JAPAN SECURITY</div>
    <div style="font-size: 0.6rem; color: #888; font-weight: bold; letter-spacing: 2px;">MOVIMENTAÇÃO DE FROTA</div>
</header>

<div class="container">
    <div class="card">
        <label><i class="fas fa-search"></i> Filtrar Período</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
            <input type="datetime-local" id="f_ini" class="modern-input">
            <input type="datetime-local" id="f_fim" class="modern-input">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button id="btnFiltrar" class="btn btn-filter">Filtrar</button>
            <button id="btnPDF" class="btn btn-pdf"><i class="fas fa-file-pdf"></i> PDF Profissional</button>
        </div>
    </div>

    <div class="card" style="border-left: 5px solid var(--red);">
        <div style="position: relative;">
            <label>Viatura (Placa ou Nome)</label>
            <input type="text" id="es_vtr" class="modern-input" placeholder="Clique para selecionar..." autocomplete="off">
            <div id="lista_vtr"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Evento</label>
                <select id="es_tipo" class="modern-input">
                    <option value="SAIDA">SAÍDA</option>
                    <option value="ENTRADA">ENTRADA</option>
                </select>
            </div>
            <div>
                <label>KM Atual</label>
                <input type="number" id="es_km" class="modern-input" placeholder="0">
            </div>
        </div>

        <div>
            <label>Motorista</label>
            <input type="text" id="es_vig" class="modern-input" placeholder="Nome Completo">
        </div>

        <button id="btnSalvar" class="btn btn-save"><i class="fas fa-save"></i> Confirmar Registro</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>DATA/HORA</th>
                    <th>VEÍCULO</th>
                    <th>MOTORISTA</th>
                    <th>KM</th>
                    <th>TIPO</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="tabelaES"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDczjdNxa2TZP07iiwTAkOLFbKcOPx1POo",
        authDomain: "japan-security-car-1a7d8.firebaseapp.com",
        projectId: "japan-security-car-1a7d8",
        storageBucket: "japan-security-car-1a7d8.firebasestorage.app",
        messagingSenderId: "616009365036",
        appId: "1:616009365036:web:f644dd6106818566900389"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let vtrCache = [];
    let historicoLocal = [];
    let filtradosPDF = [];

    onAuthStateChanged(auth, (user) => {
        if (user) { carregarVtr().then(() => carregarHistorico()); }
        else { window.location.href = "login.html"; }
    });

    async function carregarVtr() {
        const snap = await getDocs(collection(db, "veiculos"));
        vtrCache = [];
        snap.forEach(d => {
            const i = d.data();
            // Verificação dupla de campos (minúsculo ou maiúsculo conforme o Firestore)
            const placa = i.placa || i.Placa;
            const nome = i.nome || i.Nome;
            if(placa && nome) {
                vtrCache.push({ 
                    id: d.id, 
                    placa: placa.toUpperCase(), 
                    nome: nome.toUpperCase(), 
                    km: i.kmAtual || 0 
                });
            }
        });
    }

    const inputVtr = document.getElementById('es_vtr');
    const boxVtr = document.getElementById('lista_vtr');

    function mostrarOpcoes(filtro = "") {
        boxVtr.innerHTML = "";
        const encontrados = vtrCache.filter(v => filtro === "" || v.placa.includes(filtro) || v.nome.includes(filtro));
        if (encontrados.length > 0) {
            encontrados.forEach(v => {
                const d = document.createElement('div');
                d.innerHTML = `<i class="fas fa-car" style="color:var(--red); margin-right:10px;"></i> <b>${v.placa}</b> - ${v.nome}`;
                d.onmousedown = () => {
                    inputVtr.value = `${v.placa} - ${v.nome}`;
                    document.getElementById('es_km').value = v.km;
                    boxVtr.style.display = 'none';
                };
                boxVtr.appendChild(d);
            });
            boxVtr.style.display = 'block';
        } else { boxVtr.style.display = 'none'; }
    }

    inputVtr.addEventListener('focus', () => mostrarOpcoes(inputVtr.value.toUpperCase()));
    inputVtr.addEventListener('input', () => mostrarOpcoes(inputVtr.value.toUpperCase()));
    inputVtr.addEventListener('blur', () => { setTimeout(() => { boxVtr.style.display = 'none'; }, 200); });

    async function carregarHistorico() {
        const snap = await getDocs(collection(db, "movimentacoes"));
        historicoLocal = [];
        snap.forEach(d => {
            const info = d.data();
            if(info.usuario === auth.currentUser.email) { 
                // Se nomeVeiculo for N/D, busca no cache pela placa
                if (!info.nomeVeiculo || info.nomeVeiculo === "MODELO N/D") {
                    const find = vtrCache.find(v => v.placa === info.veiculo);
                    info.nomeVeiculo = find ? find.nome : "NÃO CADASTRADO";
                }
                historicoLocal.push({ id: d.id, ...info }); 
            }
        });
        renderizar();
    }

    function renderizar() {
        const ini = document.getElementById('f_ini').value;
        const fim = document.getElementById('f_fim').value;
        const tsIni = ini ? new Date(ini).getTime() : 0;
        const tsFim = fim ? new Date(fim).getTime() : Infinity;
        const corpo = document.getElementById('tabelaES');
        corpo.innerHTML = "";
        filtradosPDF = historicoLocal.filter(i => i.timestamp >= tsIni && i.timestamp <= tsFim).sort((a,b) => b.timestamp - a.timestamp);
        filtradosPDF.forEach(i => {
            const cor = i.tipo === "SAIDA" ? "#e63946" : "#2ecc71";
            corpo.innerHTML += `<tr><td style="color:#777; font-size:0.65rem;">${i.dataExibicao}</td><td><b>${i.veiculo}</b><br><small style="color:var(--red)">${i.nomeVeiculo}</small></td><td>${i.vigilante}</td><td>${i.km}</td><td style="color:${cor}; font-weight:bold">${i.tipo}</td><td><button onclick="apagarRegistro('${i.id}')" style="background:none; border:none; color:#444;"><i class="fas fa-trash"></i></button></td></tr>`;
        });
    }

    document.getElementById('btnSalvar').onclick = async () => {
        const valorInput = inputVtr.value.toUpperCase();
        const km = document.getElementById('es_km').value;
        const vig = document.getElementById('es_vig').value.toUpperCase();
        if(!valorInput || !km || !vig) return alert("Preencha tudo!");
        
        const vEncontrado = vtrCache.find(v => valorInput.includes(v.placa));
        const placaFinal = vEncontrado ? vEncontrado.placa : valorInput;
        const nomeFinal = vEncontrado ? vEncontrado.nome : "Modelo Avulso";
        
        try {
            await addDoc(collection(db, "movimentacoes"), { 
                veiculo: placaFinal, 
                nomeVeiculo: nomeFinal, 
                km: Number(km), 
                vigilante: vig, 
                tipo: document.getElementById('es_tipo').value, 
                timestamp: new Date().getTime(), 
                dataExibicao: new Date().toLocaleString('pt-BR'), 
                usuario: auth.currentUser.email 
            });
            if(vEncontrado) await updateDoc(doc(db, "veiculos", vEncontrado.id), { kmAtual: Number(km) });
            alert("✓ Salvo!"); location.reload();
        } catch (e) { alert("Erro ao salvar."); }
    };

    document.getElementById('btnFiltrar').onclick = renderizar;

    document.getElementById('btnPDF').onclick = () => {
        if (filtradosPDF.length === 0) return alert("Sem dados!");
        const { jsPDF } = window.jspdf;
        const docPdf = new jsPDF('l', 'mm', 'a4');
        const grupos = {};
        
        filtradosPDF.forEach(item => {
            const nomeExibicao = item.nomeVeiculo || "NÃO INFORMADO";
            const chave = `${item.veiculo} - ${nomeExibicao}`;
            if (!grupos[chave]) grupos[chave] = [];
            grupos[chave].push(item);
        });

        let yPos = 20;
        docPdf.setFontSize(22); docPdf.setTextColor(230, 57, 70); docPdf.text("JAPAN SECURITY", 14, yPos);
        docPdf.setFontSize(10); docPdf.setTextColor(100); docPdf.text("RELATÓRIO CONSOLIDADO DE MOVIMENTAÇÃO DE FROTA", 14, yPos + 7);
        yPos += 20;

        Object.keys(grupos).sort().forEach(veiculo => {
            if (yPos > 170) { docPdf.addPage(); yPos = 20; }
            docPdf.setFillColor(245, 245, 245); docPdf.rect(14, yPos, 269, 8, 'F');
            docPdf.setFontSize(12); docPdf.setTextColor(0); docPdf.setFont("helvetica", "bold"); docPdf.text(`VEÍCULO: ${veiculo}`, 18, yPos + 6);
            yPos += 10;
            const movs = grupos[veiculo].sort((a, b) => a.timestamp - b.timestamp);
            const rows = movs.map(m => [m.dataExibicao, m.vigilante, m.km + " KM", { content: m.tipo, styles: { textColor: m.tipo === 'SAIDA' ? [230, 57, 70] : [46, 204, 113], fontStyle: 'bold' } }, m.usuario.split('@')[0].toUpperCase()]);
            docPdf.autoTable({ head: [["DATA/HORA", "MOTORISTA", "KM", "EVENTO", "OPERADOR"]], body: rows, startY: yPos, theme: 'striped', headStyles: { fillColor: [230, 57, 70] }, margin: { left: 14 }, didDrawPage: (data) => { yPos = data.cursor.y + 15; } });
        });
        docPdf.save("Relatorio_Japan_Security.pdf");
    };

    window.apagarRegistro = async (id) => { if(confirm("Excluir?")) { await deleteDoc(doc(db, "movimentacoes", id)); carregarHistorico(); } };
</script>
</body>
</html>
