<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Security | Movimentação</title>
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="has-sidebar">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-shield-alt logo-icon"></i>
                <div><h2>JAPAN</h2><span>SECURITY</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Menu Principal</a></li>
                <li><a href="vehicles.html"><i class="fas fa-car"></i> Veículos</a></li>
                <li><a href="entrada_saida.html" class="active"><i class="fas fa-exchange-alt"></i> Movimentação</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>
        
        <header class="top-bar">
            <h1>Controle de Entrada e Saída</h1>
        </header>

        <section class="content-body">
            <div class="card form-card">
                <div class="card-header"><i class="fas fa-plus-circle"></i> Novo Registro</div>
                
                <div class="row">
                    <div class="input-group">
                        <label>Viatura (Placa)</label>
                        <input list="listaVeiculos" id="veiculo" class="modern-input" placeholder="Selecione ou digite..." onchange="puxarKmAutomatico()">
                        <datalist id="listaVeiculos"></datalist>
                    </div>
                    <div class="input-group">
                        <label>Tipo de Operação</label>
                        <select id="tipo" class="modern-input">
                            <option value="Saída">Saída</option>
                            <option value="Entrada">Entrada</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>KM Atual</label>
                        <input id="km" type="number" class="modern-input" placeholder="00000">
                    </div>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Motorista / Vigilante</label>
                        <input id="motorista" class="modern-input" placeholder="Nome do condutor">
                    </div>
                    <div class="input-group">
                        <label>Observação (Opcional)</label>
                        <input id="obs" class="modern-input" placeholder="Ex: Viatura suja, avaria...">
                    </div>
                </div>

                <button class="btn-primary" onclick="salvar()">
                    <i class="fas fa-save"></i> Registrar Movimentação
                </button>
            </div>

            <div class="card filter-card mt-20">
                <div class="card-header"><i class="fas fa-filter"></i> Filtrar e Exportar</div>
                <div class="row">
                    <div class="input-group">
                        <label>De (Data e Hora):</label>
                        <input type="datetime-local" id="dataInicio" class="modern-input">
                    </div>
                    <div class="input-group">
                        <label>Até (Data e Hora):</label>
                        <input type="datetime-local" id="dataFim" class="modern-input">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-primary" style="background-color: #555;" onclick="renderizarTabela()">
                        <i class="fas fa-search"></i> Filtrar
                    </button>
                    <button class="btn-primary" style="background-color: #2ecc71;" onclick="gerarPDF()">
                        <i class="fas fa-file-pdf"></i> Exportar PDF
                    </button>
                </div>
            </div>

            <div class="card table-card mt-20">
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Data/Hora</th>
                                <th>Veículo</th>
                                <th>Tipo</th>
                                <th>Motorista</th>
                                <th>KM</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/entrada_saida.js"></script>
</body>
</html>
